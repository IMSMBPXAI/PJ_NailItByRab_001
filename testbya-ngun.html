<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
  /* ตั้งค่าให้ทั้งหน้าเว็บใช้ฟอนต์ Kanit */
  body {
    font-family: 'Kanit', sans-serif;
    }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto p-4 text-[#800000]">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold">Calender View</h2>
        <div class="flex gap-2">
            <select id="monthSelect" class="bg-gray-200 rounded-lg px-2 py-1 text-xs outline-none"></select>
            <select id="yearSelect" class="bg-gray-200 rounded-lg px-2 py-1 text-xs outline-none"></select>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-xl p-4 border border-gray-100">
        <p id="currentMonthDisplay" class="text-center font-bold mb-4 uppercase tracking-widest text-sm"></p>
        <div class="grid grid-cols-7 text-center text-[10px] font-bold border-b border-[#800000] pb-2 mb-2 italic">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 text-center text-xs gap-y-2"></div>
    </div>
</div>

<div id="bookingModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
        <h3 class="font-bold mb-4">เพิ่มรายการวันที่ <span id="selectedDateText"></span></h3>
        <input type="text" id="taskInput" placeholder="ชื่อลูกค้า / บริการ" class="w-full border p-2 rounded-lg mb-4 text-sm outline-none focus:border-[#800000]">
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 bg-gray-200 rounded-lg text-sm font-bold">ยกเลิก</button>
            <button onclick="saveTask()" class="flex-1 py-2 bg-[#800000] text-white rounded-lg text-sm font-bold">บันทึก</button>
        </div>
    </div>
</div>
<script>
    const monthSelect = document.getElementById('monthSelect');
const yearSelect = document.getElementById('yearSelect');
const calendarGrid = document.getElementById('calendarGrid');
const currentMonthDisplay = document.getElementById('currentMonthDisplay');
const modal = document.getElementById('bookingModal');
const selectedDateText = document.getElementById('selectedDateText');

const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
let currentViewDate = new Date(); // วันที่ปัจจุบันที่กำลังดูอยู่

// 1. สร้าง Option ใน Select
months.forEach((m, i) => monthSelect.innerHTML += `<option value="${i}">${m}</option>`);
for(let y = 2024; y <= 2030; y++) yearSelect.innerHTML += `<option value="${y}">${y}</option>`;

// 2. ฟังก์ชันวาดปฏิทิน
function renderCalendar() {
    const year = parseInt(yearSelect.value);
    const month = parseInt(monthSelect.value);
    
    calendarGrid.innerHTML = '';
    currentMonthDisplay.innerText = `${months[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // เติมช่องว่างวันของเดือนก่อนหน้า
    for (let i = 0; i < firstDay; i++) {
        calendarGrid.innerHTML += `<span class="opacity-0"></span>`;
    }

    // สร้างวันที่ 1 ถึงสิ้นเดือน
    for (let day = 1; day <= daysInMonth; day++) {
        const dateBtn = document.createElement('button');
        dateBtn.innerText = day;
        dateBtn.className = "h-8 w-8 mx-auto flex items-center justify-center rounded-full hover:bg-[#FFDAB9] transition-colors cursor-pointer font-medium";
        
        // ถ้าเป็นวันนี้ให้ใส่สีเน้น
        const today = new Date();
        if(day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
            dateBtn.classList.add('bg-[#FFD700]', 'text-[#800000]', 'font-bold');
        }

        dateBtn.onclick = () => openModal(day, month, year);
        calendarGrid.appendChild(dateBtn);
    }
}

// 3. ฟังก์ชัน Modal
function openModal(d, m, y) {
    selectedDateText.innerText = `${d} ${months[m]} ${y}`;
    modal.classList.remove('hidden');
}

function closeModal() {
    modal.classList.add('hidden');
    document.getElementById('taskInput').value = '';
}

function saveTask() {
    const task = document.getElementById('taskInput').value;
    if(task) {
        alert(`บันทึกรายการ: ${task} สำหรับวันที่ ${selectedDateText.innerText} เรียบร้อย!`);
        // ในอนาคตคุณสามารถใช้ fetch() เพื่อส่งข้อมูลไปเก็บใน Database ได้ที่นี่
        closeModal();
    }
}

// Initial setup
monthSelect.value = currentViewDate.getMonth();
yearSelect.value = currentViewDate.getFullYear();
renderCalendar();

// ผูก Event เมื่อเปลี่ยน Select
monthSelect.onchange = renderCalendar;
yearSelect.onchange = renderCalendar;
</script>
</body>
</html>
