<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Nail It By Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { brand: { 900: '#7f1d1d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans relative overflow-x-hidden">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full md:w-auto">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                <div class="flex items-center justify-start">
                    <a href="Homepage.html" class="flex items-center mr-6">
                        <div class="w-12 h-12 mr-3 bg-white rounded-full flex items-center justify-center text-red-900 font-bold text-xs overflow-hidden">
                            <img src="logo rabbitz.svg" alt="Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='LOGO'">
                        </div>
                    </a>
                    <div class="hidden md:block relative mr-4"> 
                        <h1 class="text-white text-lg font-medium">NAIL IT BY RABBITZ สาขา มหาวิทยาลัยพะเยา</h1>
                    </div>
                </div>

                <div class="flex items-center justify-between w-auto">
                    <ul class="flex flex-row space-x-6 text-sm font-medium border-0 mr-8">
                        <li><a href="Homepage.html" class="text-white hover:text-red-900 bg-red-900 hover:bg-white px-3 py-2 rounded-lg transition">Homepage</a></li>
                        <div class="hidden lg:block w-px h-6 bg-white mr-2"></div> 
                        <li><a href="Contact.html" class="text-white hover:text-red-900 bg-red-900 hover:bg-white px-3 py-2 rounded-lg transition">Contact</a></li>
                    </ul>
                    <div class="hidden lg:block w-px h-6 bg-white mr-4"></div>
                    <div class="flex items-center space-x-4 mr-4">
                        <a href="Signup.html" class="text-white border-2 border-white bg-white-700 hover:bg-red-800 font-medium rounded-lg text-sm px-4 py-2 transition">Sign up</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div id="loadingModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-all text-center">
            <svg class="animate-spin h-10 w-10 text-red-900 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-4 text-gray-600 font-medium" id="loadingText">กำลังตรวจสอบข้อมูลบัญชี...</p>
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center pt-20 pb-10 px-4">
        <div class="bg-gray-200 p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-red-900">
            <div class="text-center mb-8 bg-red-900 p-4 rounded-xl border-2 shadow-inner">
                <h1 class="text-3xl font-bold text-white uppercase tracking-wide" id="welcomeTitle">Welcome Back</h1>
                <p class="text-white text-sm mt-2" id="welcomeSub">เข้าสู่ระบบเพื่อใช้งานเว็บไซต์</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-red-900 mb-1">Email :</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-900 outline-none transition" placeholder="name@example.com">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-sm font-medium text-red-900">Password :</label>
                        <a href="Forgetpassword.html" class="text-xs text-red-700 hover:underline">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-900 outline-none transition" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-2.5 rounded-lg shadow-md transition duration-300 transform hover:scale-[1.02]">
                    SIGN IN
                </button>
            </form>

            <div class="mt-6 flex items-center justify-between">
                <span class="border-b border-gray-300 w-1/5"></span>
                <span class="text-xs text-gray-400 uppercase font-bold">หรือเข้าสู่ระบบด้วย</span>
                <span class="border-b border-gray-300 w-1/5"></span>
            </div>

            <div class="mt-6 flex flex-col gap-3">
                <button type="button" id="btn-google" class="flex items-center justify-center w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-700 hover:bg-gray-50 transition duration-300 cursor-pointer">
                    <svg class="w-5 h-5 mr-3" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path></svg>
                    <span class="font-medium">Sign in with Google</span>
                </button>

                <button type="button" id="btn-facebook" class="flex items-center justify-center w-full px-4 py-2 border border-transparent rounded-lg shadow-sm bg-[#1877F2] text-white hover:bg-[#166fe5] transition duration-300 cursor-pointer">
                    <svg class="w-5 h-5 mr-3 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.791-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    <span class="font-medium">Sign in with Facebook</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('rabbitz_temp_role');
            if (role === 'admin') {
                document.getElementById('welcomeTitle').innerText = "Admin Login";
                document.getElementById('welcomeSub').innerText = "เข้าสู่ระบบจัดการหลังร้าน";
            }
        });

        // 1. ฟังก์ชัน Login ด้วยอีเมล (ตรวจสอบจากข้อมูลที่สมัครในหน้า Signup)
        function handleEmailLogin() {
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const modal = document.getElementById('loadingModal');

            if (!emailInput || !passwordInput) {
                alert('กรุณากรอกอีเมลและรหัสผ่าน');
                return;
            }

            modal.classList.remove('hidden');

            // ดึงข้อมูลผู้ใช้ทั้งหมดที่เคยสมัครสมาชิกไว้จาก LocalStorage
            const storedUsers = JSON.parse(localStorage.getItem('rabbitz_users')) || [];

            // ตรวจสอบว่ามีข้อมูลตรงกันหรือไม่
            const userMatch = storedUsers.find(u => u.email === emailInput && u.password === passwordInput);

            setTimeout(() => {
                modal.classList.add('hidden');
                if (userMatch) {
                    // กรณีพบข้อมูลบัญชี
                    processUserLogin({ 
                        displayName: userMatch.fullname, 
                        email: userMatch.email,
                        role: userMatch.role // ใช้ role จากตอนสมัคร (ปกติคือ customer)
                    });
                } else {
                    // กรณีไม่พบข้อมูล
                    alert('ไม่พบบัญชีผู้ใช้ หรือรหัสผ่านไม่ถูกต้อง กรุณาตรวจสอบอีกครั้งครับ');
                }
            }, 800);
        }

        // 2. ฟังก์ชันหลักในการจัดเก็บ Session และย้ายหน้าตามสิทธิ์ (Role)
        function processUserLogin(user) {
            // 1. ดึงข้อมูลสิทธิ์จากระบบหลังร้านที่แอดมินเพิ่มไว้
            const rolesData = JSON.parse(localStorage.getItem('rabbitz_roles')) || [];
            
            // 2. เช็คว่าชื่อหรืออีเมลตรงกับในระบบสิทธิ์หรือไม่
            const userRoleInfo = rolesData.find(r => r.name === user.displayName || r.name === user.email);
            
            // 3. ลำดับการให้สิทธิ์: แอดมินในโค้ด -> แอดมินจากระบบ -> ลูกค้าทั่วไป
            let finalRole = 'customer';
            
            if (user.displayName === 'I''m lonely' || user.email === 'oppok8801@gmail.com') {
                finalRole = 'admin'; // <--- กำหนด Admin ถาวรไว้ในโค้ดตรงนี้ (เปลี่ยนชื่อ/อีเมลตามต้องการ)
            } else if (userRoleInfo) {
                finalRole = userRoleInfo.role;
            } else {
                finalRole = user.role || 'customer';
            }
            
            const userData = {
                isLoggedIn: true,
                name: user.displayName || 'ผู้ใช้งาน',
                email: user.email || '',
                photoUrl: user.photoURL || '',
                uid: user.uid || Date.now(),
                role: finalRole
            };
            
            localStorage.setItem('rabbitz_currentUser', JSON.stringify(userData));
            localStorage.removeItem('rabbitz_temp_role');

            // แยกเส้นทางส่งไปหน้าให้ถูกต้องตาม Role
            if (finalRole === 'admin' || finalRole === 'tech') {
                window.location.href = 'HomepageAddmin.html';
            } else {
                window.location.href = 'HomepageCus.html';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            handleEmailLogin();
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";

        // Config ของโปรเจกต์ fron-endpj ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyAibegOwY9mPAp0VSMNtMo5QA_RZ3xV9mc",
            authDomain: "fron-endpj.firebaseapp.com",
            projectId: "fron-endpj",
            storageBucket: "fron-endpj.firebasestorage.app",
            messagingSenderId: "469483842118",
            appId: "1:469483842118:web:ddce7197ce70b8b5e5b847",
            measurementId: "G-NZW5YNXMLY"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const modal = document.getElementById('loadingModal');

        // เหตุการณ์เมื่อคลิกปุ่ม Google
        document.getElementById('btn-google').addEventListener('click', () => {
            modal.classList.remove('hidden');
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    processUserLogin(result.user);
                })
                .catch((error) => {
                    modal.classList.add('hidden');
                    if (error.code !== 'auth/popup-closed-by-user') {
                        alert(`เกิดข้อผิดพลาด: ${error.message}`);
                    }
                });
        });

        // เหตุการณ์เมื่อคลิกปุ่ม Facebook
        document.getElementById('btn-facebook').addEventListener('click', () => {
            modal.classList.remove('hidden');
            const provider = new FacebookAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    processUserLogin(result.user);
                })
                .catch((error) => {
                    modal.classList.add('hidden');
                    if (error.code !== 'auth/popup-closed-by-user') {
                        alert(`เกิดข้อผิดพลาด: ${error.message}`);
                    }
                });
        });
    </script>
</body>
</html>
