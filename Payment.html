<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงินมัดจำ - Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Kanit', 'sans-serif'], }, 
                    colors: { brand: { 900: '#7f1d1d' } } 
                } 
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                <div class="flex items-center justify-start">
                    <a href="HomepageCus.html" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="w-12 h-12 mr-3 bg-white rounded-full object-cover p-1" alt="Rabbitz Logo" />
                        <span class="self-center text-xl font-semibold whitespace-nowrap text-white">NAIL IT BY RABBITZ</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <div class="pt-28 pb-12 px-4 flex flex-col justify-center items-center min-h-screen">
        
        <div class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-red-900 w-full max-w-sm text-center relative" id="payment-container" style="display: none;">
            
            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-900 mb-3"></div>
                <span class="text-red-900 font-bold">กำลังตรวจสอบยอดเงิน...</span>
            </div>

            <h2 class="font-bold text-2xl text-red-900 mb-1">ชำระเงินมัดจำ</h2>
            <h3 class="text-sm text-gray-500 font-medium mb-6 border-b pb-4">สแกน QR Code เพื่อยืนยันคิว</h3>
            
            <div class="text-4xl font-bold text-gray-800 mb-2">
                <span id="display-amount">100.00</span> 
                <span class="text-lg text-gray-500 font-normal">THB</span>
            </div>
            
            <div class="text-xs text-gray-500 font-medium mb-6 bg-red-50 py-1.5 px-4 rounded-full inline-block border border-red-100">
                โอนเข้าพร้อมเพย์: <span id="display-account" class="text-red-900 font-bold">...</span>
            </div>
            
            <div class="relative mx-auto w-[200px] h-[200px] mb-6 border-4 border-gray-100 rounded-xl p-2 shadow-sm bg-white">
                <div id="qrcode" class="flex justify-center items-center w-full h-full"></div>
                
                <div id="expired-overlay" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm flex-col justify-center items-center z-10 rounded-lg">
                    <div class="text-5xl mb-2">⏳</div>
                    <div class="text-red-600 font-bold">หมดเวลาชำระเงิน</div>
                </div>
            </div>

            <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
                <span class="text-gray-600 text-sm font-medium">เวลาที่เหลือ</span>
                <span id="timer" class="text-2xl font-mono font-bold text-red-900">15:00</span>
            </div>

            <button onclick="manualCheckPayment()" class="w-full bg-red-900 hover:bg-red-800 text-white font-medium py-3 rounded-xl shadow-md transition-all">
                ตรวจสอบสถานะการชำระเงิน
            </button>
            
            <a href="javascript:simulatePayment('CANCELLED')" class="block mt-4 text-sm text-gray-500 hover:text-red-900 underline transition">
                ยกเลิกการทำรายการ
            </a>
        </div>

        <div class="mt-8 p-4 border border-dashed border-gray-300 rounded-xl bg-gray-100 w-full max-w-sm" id="simulation-tools" style="display: none;">
            <p class="text-xs text-gray-500 mb-3 text-center font-bold">-- ส่วนสำหรับจำลองการจ่ายเงิน --</p>
            <div class="flex gap-2 justify-center">
                <button onclick="simulatePayment('SUCCESS')" class="flex-1 py-2 bg-green-600 text-white rounded-lg text-xs font-medium hover:bg-green-700 shadow-sm transition">จำลอง: จ่ายสำเร็จ</button>
                <button onclick="simulatePayment('FAILED')" class="flex-1 py-2 bg-red-600 text-white rounded-lg text-xs font-medium hover:bg-red-700 shadow-sm transition">จำลอง: จ่ายไม่สำเร็จ</button>
            </div>
        </div>

    </div>

    <script>
        let currentBooking = null;
        let isExpired = false;
        let countdownInterval;

        document.addEventListener('DOMContentLoaded', () => {
            const bookingDataStr = sessionStorage.getItem('bookingData');

            if (!bookingDataStr) {
                alert('ไม่พบข้อมูลการทำรายการ กรุณาจองคิวใหม่');
                window.location.href = 'Booking.html';
                return;
            }

            currentBooking = JSON.parse(bookingDataStr);

            // แสดงส่วนชำระเงิน
            document.getElementById('payment-container').style.display = 'block';
            document.getElementById('simulation-tools').style.display = 'block';
            
            initPaymentSystem();
        });

        function initPaymentSystem() {
            const config = {
                promptpayID: "0948263229",
                amount: 100.00,
                timeLimit: 15 * 60, // 15 นาที
            };

            function generatePromptPay(id, amount) {
                const target = id.length >= 13 ? id : ("0066" + id.substring(1));
                const targetType = id.length >= 13 ? "02" : "01";
                let data = [
                    "000201", "010211", "2937",
                    "0016A000000677010111" + targetType + (target.length < 10 ? "0" + target.length : target.length) + target,
                    "5802TH", "5303764",
                    "54" + (amount.toFixed(2).length < 10 ? "0" + amount.toFixed(2).length : amount.toFixed(2).length) + amount.toFixed(2)
                ].join("");
                data += "6304";
                data += calcCRC16(data);
                return data;
            }

            function calcCRC16(str) {
                let crc = 0xFFFF;
                for (let i = 0; i < str.length; i++) {
                    let x = ((crc >> 8) ^ str.charCodeAt(i)) & 0xFF;
                    x ^= x >> 4;
                    crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
                }
                return ("0000" + crc.toString(16).toUpperCase()).slice(-4);
            }

            function formatID(id) {
                if(id.length === 10) return id.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
                return id;
            }

            document.getElementById('display-amount').textContent = config.amount.toFixed(2);
            document.getElementById('display-account').textContent = formatID(config.promptpayID);

            const payload = generatePromptPay(config.promptpayID, config.amount);
            const qrDiv = document.getElementById("qrcode");
            new QRCode(qrDiv, {
                text: payload,
                width: 180, height: 180,
                colorDark : "#1e293b", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            let timeLeft = config.timeLimit;
            const timerDisplay = document.getElementById('timer');
            const overlay = document.getElementById('expired-overlay');
            
            countdownInterval = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerDisplay.textContent = `${m}:${s}`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(countdownInterval); 
                    isExpired = true; 
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    
                    updateBookingStatus('Failed');

                    Swal.fire({
                        icon: 'warning',
                        title: 'หมดเวลาชำระเงิน',
                        text: 'คิวนี้หมดเวลาการยืนยันแล้ว กรุณาเริ่มทำรายการจองใหม่อีกครั้ง',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#7f1d1d',
                        allowOutsideClick: false
                    }).then(() => {
                        sessionStorage.removeItem('bookingData');
                        window.location.href = 'Booking.html';
                    });
                }
            }, 1000);
        }

        // =========================================================
        // 3. ฟังก์ชันอัปเดตข้อมูลเข้าฐานข้อมูลและเชื่อมโยงปุ่มจำลอง
        // =========================================================
        function updateBookingStatus(newStatus) {
            if(!currentBooking) return;

            let allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
            // หาคิวที่ตัวเองกั๊กเอาไว้โดยเทียบจาก ID
            const bookingIndex = allBookings.findIndex(b => b.id === currentBooking.id);

            if (bookingIndex > -1) {
                allBookings[bookingIndex].status = newStatus;
                localStorage.setItem('allBookings', JSON.stringify(allBookings));
            }
        }

        function simulatePayment(status) {
            if (isExpired) return;

            clearInterval(countdownInterval);

            if (status === 'SUCCESS') {
                updateBookingStatus('รอการยืนยัน'); // <--- เปลี่ยนให้เป็นรอแอดมินอนุมัติ
                
                Swal.fire({
                    icon: 'success',
                    title: 'ชำระเงินสำเร็จ!',
                    text: 'ยืนยันคิวเรียบร้อย กำลังพาท่านไปหน้าประวัติการจอง...',
                    timer: 2000,
                    showConfirmButton: false,
                    allowOutsideClick: false
                }).then(() => {
                    sessionStorage.removeItem('bookingData');
                    window.location.href = "History.html"; 
                });

            } else if (status === 'FAILED') {
                updateBookingStatus('Failed');

                Swal.fire({
                    icon: 'error',
                    title: 'การชำระเงินล้มเหลว',
                    text: 'กรุณาตรวจสอบยอดเงิน หรือลองทำรายการใหม่อีกครั้ง',
                    confirmButtonText: 'กลับไปหน้าจองคิว',
                    confirmButtonColor: '#7f1d1d',
                    allowOutsideClick: false
                }).then(() => {
                    sessionStorage.removeItem('bookingData');
                    window.location.href = "Booking.html"; 
                });

            } else if (status === 'CANCELLED') {
                updateBookingStatus('Cancelled');

                Swal.fire({
                    icon: 'info',
                    title: 'ยกเลิกรายการ',
                    text: 'คุณได้ยกเลิกรายการจองนี้แล้ว',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#7f1d1d',
                    allowOutsideClick: false
                }).then(() => {
                    sessionStorage.removeItem('bookingData');
                    window.location.href = "Booking.html"; 
                });
            }
        }

        function manualCheckPayment() {
            if (isExpired) return;

            document.getElementById('loading-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                
                Swal.fire({
                    icon: 'info',
                    title: 'ยังไม่ได้รับยอดเงิน',
                    text: 'ระบบกำลังรอการชำระเงินจากธนาคาร...',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#7f1d1d'
                });
            }, 1500);
        }

    </script>
</body>
</html>
