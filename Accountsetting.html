<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setting - Nail It By Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { brand: { 900: '#7f1d1d' } }
                }
            }
        }
    </script>
    <style>
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
 
    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
               
                <div class="flex items-center justify-start">
                    <a href="HomepageCus.html" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="size-16 mr-3 bg-white rounded-full p-1" alt="Rabbitz Logo" onerror="this.src='https://ui-avatars.com/api/?name=Logo&background=fff&color=7f1d1d'"/>
                    </a>
 
                    <div class="hidden md:block relative mr-4">
                        <h1 class="text-white text-lg font-medium">NAIL IT BY RABBITZ สาขา มหาวิทยาลัยพะเยา</h1>
                    </div>
                </div>
 
                <div class="flex items-center gap-6">
                    <ul class="hidden lg:flex flex-row space-x-6 text-sm font-medium text-white items-center">
                        <li><a href="HomepageCus.html" class="hover:text-red-200 transition">Homepage</a></li>
                        <li class="w-px h-5 bg-white/30"></li>
                        <li><a href="Contact.html" class="hover:text-red-200 transition">Contact</a></li>
                        <li class="w-px h-5 bg-white/30"></li>
                        <li><a href="Booking.html" class="hover:text-red-200 transition">Booking</a></li>
                    </ul>
                   
                    <div class="hidden lg:block w-px h-6 bg-white/30 mx-2"></div>
 
                    <div class="flex items-center space-x-4">
                        <span id="userNameDisplay" class="text-white text-sm font-medium hidden md:block"></span>
 
                        <button type="button" onclick="window.location.href='NotiCus.html'" class="relative p-2 text-white hover:bg-white/10 rounded-full transition focus:outline-none">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                            </svg>
                        </button>
 
                        <button type="button" class="flex text-sm bg-white rounded-full focus:ring-4 focus:ring-red-700 overflow-hidden size-10 border-2 border-white/20 shadow-sm transition hover:scale-105">
                            <img id="userProfilePicNav" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=User&background=fff&color=7f1d1d" alt="User Profile">
                        </button>
 
                        <button onclick="handleLogout()" class="text-xs text-white underline hover:text-red-200 ml-2 hidden lg:block">Log out</button>
                    </div>

                    <div class="flex items-center gap-4 border-l border-white/30 pl-6">
                        <button id="menuBtn" class="text-white hover:bg-white/10 p-2 rounded-lg transition focus:outline-none">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div id="sidebar" class="fixed top-0 right-0 h-full w-72 bg-gradient-to-b from-[#801919] to-[#5d1212] z-[100] transform translate-x-full transition-transform duration-300 ease-in-out shadow-2xl rounded-l-[3rem]">
            <div class="p-8 flex flex-col items-center">
                <button id="closeBtn" class="self-end text-white mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="size-24 bg-white rounded-full p-1 shadow-xl overflow-hidden border-2 border-white/30 mb-3">
                    <img id="userProfilePicSidebar" class="w-full h-full object-cover rounded-full" src="https://ui-avatars.com/api/?name=User&background=random" alt="User Profile">
                </div>
                <p id="sidebarUserNameDisplay" class="text-white font-bold text-lg uppercase tracking-wide">Loading...</p>
            </div>
            <div class="px-6 py-4">
                <div class="bg-white/90 rounded-[2rem] p-6 space-y-3 text-center shadow-lg">
                    <a href="Accountsetting.html" class="block text-[#801919] font-bold hover:scale-105 transition uppercase tracking-wider text-medium">Setting</a>
                    <hr class="border-[#801919]/20 w-1/2 mx-auto">
                    <a href="History.html" class="block text-[#801919] font-bold hover:scale-105 transition uppercase tracking-wider text-medium">My Booking & History</a>
                </div>
            </div>
            <div class="absolute bottom-12 left-0 right-0 px-10 text-center">
                <button onclick="handleLogout()" class="w-full border-2 border-white text-white py-2 rounded-full font-bold uppercase text-medium hover:bg-white hover:text-[#801919] transition">
                    Sign out
                </button>
            </div>
        </div>
        <div id="overlay" class="fixed inset-0 bg-black/40 z-[90] hidden"></div>
    </header>
 
    <main class="pt-24 pb-12 px-4 max-w-xl mx-auto">
       
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mt-10">
            <div class="h-24 bg-gradient-to-r from-red-900 to-red-700"></div>
 
            <div class="px-8 pb-8">
                <div class="relative -top-12 flex flex-col items-center">
                    <div class="relative group cursor-pointer" onclick="document.getElementById('profile-upload').click()">
                        <div class="w-24 h-24 bg-white p-1 rounded-full shadow-md overflow-hidden">
                            <img id="main-profile-preview" src="https://ui-avatars.com/api/?name=User&background=7f1d1d&color=fff" alt="Profile" class="rounded-full w-full h-full object-cover">
                        </div>
                        <div class="absolute inset-0 bg-black/20 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </div>
 
                    <input type="file" id="profile-upload" class="hidden" accept="image/*">
                   
                    <button type="button" onclick="document.getElementById('profile-upload').click()" class="mt-3 text-sm text-red-900 font-semibold hover:underline">
                        เปลี่ยนรูปโปรไฟล์
                    </button>
                </div>
 
                <form id="settingForm" class="space-y-5 -mt-6">
                    <div>
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">ชื่อผู้ใช้งาน (Username)</label>
                        <input type="text" id="username" 
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-900 focus:border-transparent outline-none transition text-gray-600">
                    </div>
 
                    <div>
                        <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1.5">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" placeholder="เช่น 081-234-5678"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-900 focus:border-transparent outline-none transition text-gray-600">
                    </div>
 
                    <div>
                        <label for="allergies" class="block text-sm font-semibold text-gray-700 mb-1.5">สิ่งที่แพ้ / ข้อควรระวัง</label>
                        <textarea id="allergies" rows="3"
                            placeholder="เช่น แพ้แอลกอฮอล์, แพ้สารเคมีบางชนิด, เล็บเปราะบางง่าย..."
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-900 focus:border-transparent outline-none transition text-gray-600 resize-none"></textarea>
                    </div>
 
                    <div class="pt-4">
                        <button type="submit"
                            class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-900/20 transition duration-300 transform active:scale-95">
                            บันทึกการเปลี่ยนแปลง
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
 
    <div id="successModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl text-center scale-90 transition-transform">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900">บันทึกสำเร็จ!</h3>
            <p class="text-gray-500 mt-2">ข้อมูลของคุณได้รับการอัปเดตแล้ว</p>
            <button onclick="closeModal()" class="mt-6 w-full py-2 bg-gray-900 text-white rounded-lg font-medium">ตกลง</button>
        </div>
    </div>
 
    <br><br>
    <footer class="text-center py-2 text-[10px] text-[#800000] border-t border-black ">
        NAIL IT BY RABBITZ สาขามหาวิทยาลัยพะเยา
    </footer>
 
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // โหลดข้อมูลผู้ใช้จาก LocalStorage
            const userDataString = localStorage.getItem('rabbitz_currentUser');
            if (userDataString) {
                const userData = JSON.parse(userDataString);
                
                // อัปเดตชื่อแสดงบน Navbar และ Sidebar
                const nameDisplay = document.getElementById('userNameDisplay');
                if (nameDisplay) nameDisplay.innerText = `Hi, ${userData.name}`;
                
                const sidebarNameDisplay = document.getElementById('sidebarUserNameDisplay');
                if (sidebarNameDisplay) sidebarNameDisplay.innerText = `Hi, ${userData.name}`;

                // โหลดข้อมูลเข้าช่องฟอร์มต่างๆ
                const usernameInput = document.getElementById('username');
                if (usernameInput) usernameInput.value = userData.name || '';
                
                const phoneInput = document.getElementById('phone');
                if (phoneInput) phoneInput.value = userData.phone || ''; // โหลดเบอร์โทร
                
                const allergiesInput = document.getElementById('allergies');
                if (allergiesInput) allergiesInput.value = userData.allergies || ''; // โหลดสิ่งที่แพ้
                
                // โหลดรูปโปรไฟล์
                const profileUrl = userData.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=7f1d1d&color=fff&bold=true`;
                
                const navPreview = document.getElementById('userProfilePicNav');
                const mainPreview = document.getElementById('main-profile-preview');
                const sidebarPreview = document.getElementById('userProfilePicSidebar');
                
                const savedPic = localStorage.getItem('savedProfilePic');
                if (savedPic) {
                    if(navPreview) navPreview.src = savedPic;
                    if(mainPreview) mainPreview.src = savedPic;
                    if(sidebarPreview) sidebarPreview.src = savedPic;
                } else {
                    if(navPreview) navPreview.src = profileUrl;
                    if(mainPreview) mainPreview.src = profileUrl;
                    if(sidebarPreview) sidebarPreview.src = profileUrl;
                }
            } else {
                alert('กรุณาเข้าสู่ระบบก่อนใช้งานครับ');
                window.location.href = 'index.html';
            }

            // ระบบเปิด-ปิด Sidebar
            const menuBtn = document.getElementById('menuBtn');
            const closeBtn = document.getElementById('closeBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if(menuBtn) menuBtn.addEventListener('click', () => { sidebar.classList.remove('translate-x-full'); overlay.classList.remove('hidden'); });
            if(closeBtn) closeBtn.addEventListener('click', () => { sidebar.classList.add('translate-x-full'); overlay.classList.add('hidden'); });
            if(overlay) overlay.addEventListener('click', () => { sidebar.classList.add('translate-x-full'); overlay.classList.add('hidden'); });
        });

        function handleLogout() {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                localStorage.removeItem('rabbitz_currentUser'); 
                localStorage.removeItem('savedProfilePic'); 
                window.location.href = 'index.html';
            }
        }

        const profileUpload = document.getElementById('profile-upload');
        const mainPreview = document.getElementById('main-profile-preview');
        const navPreview = document.getElementById('userProfilePicNav');
        const sidebarPreview = document.getElementById('userProfilePicSidebar');
 
        profileUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageUrl = e.target.result;
                    mainPreview.src = imageUrl;
                    navPreview.src = imageUrl;
                    if(sidebarPreview) sidebarPreview.src = imageUrl;
                    localStorage.setItem('savedProfilePic', imageUrl);
                }
                reader.readAsDataURL(file);
            }
        });
 
        // --- ส่วนที่ปรับปรุง: บันทึกข้อมูลฟอร์มลง LocalStorage ---
        const form = document.getElementById('settingForm');
        const modal = document.getElementById('successModal');
 
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;
 
            // ดึงค่าจากช่อง Input ปัจจุบัน
            const newName = document.getElementById('username').value;
            const newPhone = document.getElementById('phone').value;
            const newAllergies = document.getElementById('allergies').value;

            // ดึงข้อมูล User เดิมมาอัปเดตและบันทึกทับ
            let userData = JSON.parse(localStorage.getItem('rabbitz_currentUser')) || {};
            userData.name = newName;
            userData.phone = newPhone;
            userData.allergies = newAllergies;
            localStorage.setItem('rabbitz_currentUser', JSON.stringify(userData));

            // อัปเดตชื่อบน Navbar และ Sidebar ทันทีโดยไม่ต้องรีเฟรชหน้า
            const nameDisplay = document.getElementById('userNameDisplay');
            if (nameDisplay) nameDisplay.innerText = `Hi, ${newName}`;
            const sidebarNameDisplay = document.getElementById('sidebarUserNameDisplay');
            if (sidebarNameDisplay) sidebarNameDisplay.innerText = `Hi, ${newName}`;

            setTimeout(() => {
                btn.innerText = "บันทึกการเปลี่ยนแปลง";
                btn.disabled = false;
                modal.classList.remove('hidden');
            }, 1000);
        });
 
        function closeModal() {
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
