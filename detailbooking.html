<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Summary - Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex items-center mx-auto max-w-[1600px]">
                <a href="HomepageCus.html" class="flex items-center mr-6">
                    <img src="logo rabbitz.svg" class="size-16 mr-3 bg-white rounded-full p-1" alt="Logo" />
                </a>
                <h1 class="text-white text-lg font-medium">สรุปรายละเอียดการจอง</h1>
            </div>
        </nav>
    </header>

    <main class="pt-32 pb-12 px-4">
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-red-900 p-6 text-white text-center">
                <h2 class="text-2xl font-bold uppercase tracking-wider">Booking Summary</h2>
                <p class="opacity-80 text-sm">กรุณาตรวจสอบข้อมูลการนัดหมายของคุณ</p>
            </div>

            <div class="p-8 space-y-6" id="summary-content">
                <div class="animate-pulse flex flex-col space-y-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                    <div class="h-4 bg-gray-200 rounded"></div>
                    <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                </div>
            </div>

            <div class="p-8 bg-gray-50 border-t flex flex-col sm:flex-row gap-4">
                <a href="Booking.html" class="flex-1 text-center py-3 border-2 border-red-900 text-red-900 font-bold rounded-xl hover:bg-red-50 transition">
                    แก้ไขข้อมูล
                </a>
                <button onclick="confirmBooking()" class="flex-1 py-3 bg-red-900 text-white font-bold rounded-xl hover:bg-red-800 shadow-md transition">
                    ยืนยันการจอง
                </button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const LOCAL_STORAGE_KEY = 'rabbitz_bookings';
            const bookings = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
            
            // ดึงข้อมูลอันล่าสุดที่เพิ่งเพิ่มเข้าไป
            const lastBooking = bookings[bookings.length - 1];

            const container = document.getElementById('summary-content');

            if (!lastBooking) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-gray-500">ไม่พบข้อมูลการจองล่าสุด</p>
                        <a href="Booking.html" class="text-red-900 underline font-bold">กลับไปหน้าจองคิว</a>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="flex justify-between border-b pb-4">
                    <span class="text-gray-500">สถานะการจอง</span>
                    <span class="font-bold text-yellow-600">${lastBooking.status}</span>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold">ชื่อลูกค้า</label>
                        <p class="text-lg font-medium">${lastBooking.customer_name}</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold">วันที่และเวลา</label>
                            <p class="font-medium text-red-900">${lastBooking.datetime} น.</p>
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold">เบอร์โทรศัพท์</label>
                            <p class="font-medium">${lastBooking.phone}</p>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold">บริการที่เลือก</label>
                        <div class="flex flex-wrap gap-2 mt-1">
                            ${lastBooking.service.split(', ').map(s => `
                                <span class="bg-red-50 text-red-900 text-xs px-3 py-1 rounded-full border border-red-100 font-medium">
                                    ${s}
                                </span>
                            `).join('')}
                        </div>
                    </div>

                    ${lastBooking.note ? `
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold">รายละเอียดเพิ่มเติม</label>
                        <p class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border italic">"${lastBooking.note}"</p>
                    </div>
                    ` : ''}
                </div>
            `;
        });

        function confirmBooking() {
            alert('ส่งข้อมูลการจองเรียบร้อยแล้ว! แอดมินจะตรวจสอบและยืนยันคิวให้คุณโดยเร็วที่สุด');
            // คุณสามารถเปลี่ยนเส้นทางไปหน้า My Booking หรือ HomepageCus ได้ที่นี่
            window.location.href = 'HomepageCus.html';
        }
    </script>
</body>
</html>
