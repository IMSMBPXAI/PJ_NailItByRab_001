<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Booking History - Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Kanit', 'sans-serif'], }, colors: { brand: { 900: '#7f1d1d' } } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                <div class="flex items-center justify-start">
                    <a href="Homepage.html" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="w-12 h-12 mr-3 bg-white rounded-full object-cover p-1" alt="Rabbitz Logo" />
                        <span class="self-center text-xl font-semibold whitespace-nowrap text-white">NAIL IT BY RABBITZ</span>
                    </a>
                </div>
                
                <div class="flex items-center gap-6">
                    <ul class="hidden lg:flex flex-row space-x-6 text-sm font-medium text-white">
                        <li><a href="Homepage.html" class="hover:text-red-200 transition">Homepage</a></li>
                        <li><a href="Booking.html" class="hover:text-red-200 transition">Booking</a></li>
                        <li><a href="History.html" class="text-red-200 font-bold border-b-2 border-red-200 pb-1">History</a></li>
                    </ul>
                    <div class="hidden lg:block w-px h-6 bg-white/30 mx-2"></div>
                    <div id="auth-container" class="flex items-center space-x-4"></div>
                </div>
            </div>
        </nav>
    </header>

    <div class="pt-28 pb-12 px-4 min-h-screen">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="font-bold text-3xl text-red-900">ประวัติการจองของฉัน</h2>
                <a href="Booking.html" class="text-sm bg-red-900 text-white px-4 py-2 rounded-lg hover:bg-red-800 transition">+ จองคิวใหม่</a>
            </div>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-lg">
                <p class="text-sm text-yellow-800 font-medium">
                    <svg class="inline w-4 h-4 mr-1 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    เงื่อนไข: การแก้ไขหรือยกเลิกคิว ต้องทำล่วงหน้าอย่างน้อย 1-3 วัน ก่อนถึงวันนัดหมาย หากน้อยกว่า 1 วันจะไม่สามารถทำรายการได้
                </p>
            </div>

            <div id="history-container" class="space-y-6">
                </div>

        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // 1. ตรวจสอบการเข้าสู่ระบบ
        // --------------------------------------------------------
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const authContainer = document.getElementById('auth-container');

        if (!currentUser) {
            alert('กรุณาเข้าสู่ระบบเพื่อดูประวัติการจอง');
            window.location.href = 'Rolechoosen.html';
        } else {
            const avatarUrl = `https://ui-avatars.com/api/?name=${currentUser.username}&background=random`;
            authContainer.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-white text-sm">คุณ ${currentUser.username}</span>
                    <button onclick="handleLogout()" class="text-xs border border-white text-white px-2 py-1 rounded hover:bg-white hover:text-red-900 transition">ออกจากระบบ</button>
                </div>
            `;
        }

        function handleLogout() {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'Rolechoosen.html';
            }
        }

        // --------------------------------------------------------
        // 2. ดึงและเรนเดอร์ข้อมูลประวัติการจอง
        // --------------------------------------------------------
        const historyContainer = document.getElementById('history-container');
        
        function renderHistory() {
            const allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
            
            // กรองเอาเฉพาะข้อมูลจองของ User ปัจจุบัน
            const myBookings = allBookings.filter(booking => booking.username === currentUser.username);

            if (myBookings.length === 0) {
                historyContainer.innerHTML = `
                    <div class="text-center py-12 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                        <p class="text-gray-500 font-medium text-lg">คุณยังไม่มีประวัติการจองคิว</p>
                    </div>`;
                return;
            }

            // เรียงลำดับจากล่าสุดไปเก่าสุด (อิงจากวันที่สร้าง)
            myBookings.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            let html = '';
            
            // กำหนดวันที่ปัจจุบัน ตัดเวลาออกเพื่อให้คำนวณวันแม่นยำ
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            myBookings.forEach((booking) => {
                const bookDate = new Date(booking.date);
                bookDate.setHours(0, 0, 0, 0);

                // คำนวณความต่างของวัน (1 วัน = 1000 * 60 * 60 * 24 มิลลิวินาที)
                const diffTime = bookDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // เช็คเงื่อนไข: จองล่วงหน้า 1 วันขึ้นไป และสถานะต้องยังไม่ถูกยกเลิก
                const canModify = diffDays >= 1 && booking.status !== 'Cancelled';

                const formattedDate = bookDate.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                
                // ตกแต่งป้ายสถานะ
                let statusBadge = '';
                if(booking.status === 'Confirmed') statusBadge = '<span class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-1 rounded-full border border-green-300">ยืนยันแล้ว</span>';
                else if(booking.status === 'Cancelled') statusBadge = '<span class="bg-red-100 text-red-800 text-xs font-bold px-2.5 py-1 rounded-full border border-red-300">ยกเลิกแล้ว</span>';

                html += `
                    <div class="bg-white border ${booking.status === 'Cancelled' ? 'border-gray-200 opacity-60' : 'border-red-100 shadow-sm'} rounded-xl p-6 relative">
                        
                        <div class="flex flex-col md:flex-row justify-between md:items-center mb-4 gap-2 border-b pb-4">
                            <div>
                                <p class="text-xs text-gray-400 mb-1">รหัสการจอง: ${booking.id}</p>
                                <h4 class="text-lg font-bold text-red-900">${formattedDate} | เวลา ${booking.time}</h4>
                            </div>
                            <div>${statusBadge}</div>
                        </div>

                        <div class="mb-4">
                            <p class="text-sm font-semibold text-gray-700 mb-1">บริการที่เลือก:</p>
                            <p class="text-sm text-gray-600">${booking.services.join(', ')}</p>
                        </div>

                        <div class="flex flex-wrap items-center justify-end gap-3 mt-4 pt-4 border-t border-gray-100">
                            ${canModify ? `
                                <button onclick="editBooking('${booking.id}')" class="text-sm px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded hover:bg-gray-200 transition">แก้ไขข้อมูล</button>
                                <button onclick="cancelBooking('${booking.id}')" class="text-sm px-4 py-2 bg-red-50 text-red-700 font-medium rounded hover:bg-red-100 border border-red-200 transition">ยกเลิกการจอง</button>
                            ` : `
                                <span class="text-xs text-gray-400 italic">ไม่สามารถแก้ไข/ยกเลิกได้ เนื่องจาก ${booking.status === 'Cancelled' ? 'ถูกยกเลิกแล้ว' : 'ใกล้ถึงเวลานัดหมาย (น้อยกว่า 1 วัน)'}</span>
                            `}
                        </div>
                    </div>
                `;
            });

            historyContainer.innerHTML = html;
        }

        // --------------------------------------------------------
        // 3. ฟังก์ชันยกเลิกการจอง
        // --------------------------------------------------------
        function cancelBooking(bookingId) {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการ "ยกเลิก" การจองคิวนี้?\n(การกระทำนี้ไม่สามารถย้อนกลับได้)')) {
                let allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
                
                // ค้นหาและเปลี่ยนสถานะ
                const bookingIndex = allBookings.findIndex(b => b.id === bookingId);
                if(bookingIndex > -1) {
                    allBookings[bookingIndex].status = 'Cancelled';
                    localStorage.setItem('allBookings', JSON.stringify(allBookings));
                    alert('ยกเลิกการจองเรียบร้อยแล้ว');
                    renderHistory(); // อัปเดตหน้าจอใหม่
                }
            }
        }

        // --------------------------------------------------------
        // 4. ฟังก์ชันแก้ไขการจอง
        // --------------------------------------------------------
        function editBooking(bookingId) {
            if(confirm('ระบบจะนำคุณไปหน้าจองคิวและยกเลิกคิวเดิมนี้โดยอัตโนมัติ ต้องการดำเนินการต่อหรือไม่?')) {
                // 1. ยกเลิกคิวเดิม
                let allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
                const bookingIndex = allBookings.findIndex(b => b.id === bookingId);
                if(bookingIndex > -1) {
                    allBookings[bookingIndex].status = 'Cancelled';
                    localStorage.setItem('allBookings', JSON.stringify(allBookings));
                }
                
                // 2. เด้งไปหน้าจองคิวใหม่
                window.location.href = 'Booking.html';
                
                /* หมายเหตุ: ในระบบจริงที่มี Backend เราจะส่ง ID ข้อมูลเก่าไปแปะในฟอร์ม 
                   แต่สำหรับ Front-end Mockup นี้ การยกเลิกของเดิมแล้วให้กดใหม่เป็นวิธีที่เสถียรที่สุดครับ */
            }
        }

        // สั่งให้เรนเดอร์ทันทีที่โหลดหน้าเสร็จ
        renderHistory();

    </script>
</body>
</html>
