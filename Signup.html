<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Nail It By Rabbitz</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        brand: { 900: '#7f1d1d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full md:w-auto">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                
                <div class="flex items-center justify-start">
                    <a href="Homepage.html" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="size-16 mr-3 bg-white rounded-full object-cover p-1" alt="Rabbitz Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='<div class=\'w-16 h-16 bg-white rounded-full flex items-center justify-center mr-3 text-red-900 font-bold text-xs\'>LOGO</div>'">
                    </a>

                    <div class="hidden md:block relative mr-4"> 
                        <h1 class="text-white text-lg font-medium">NAIL IT BY RABBITZ สาขา มหาวิทยาลัยพะเยา</h1>
                    </div>
                </div>

                <div class="flex items-center justify-between w-auto">
                    <ul class="flex flex-row space-x-6 text-sm font-medium border-0 mr-8">
                        <li><a href="Homepage.html" class="text-white hover:text-red-900 bg-red-900 hover:bg-white p-2 rounded-lg transition">Homepage</a></li>
                        <div class="hidden lg:block w-px h-6 bg-white mr-4"></div> 
                        <li><a href="Contact.html" class="text-white hover:text-red-900 bg-red-900 hover:bg-white p-2 rounded-lg transition">Contact</a></li>
                    </ul>
                    <div class="hidden lg:block w-px h-6 bg-white mr-4"></div>
                    <div class="flex items-center space-x-4 mr-4">
                        <a href="Rolechoosen.html" class="text-red-900 bg-white hover:bg-gray-200 font-medium rounded-lg text-sm px-4 py-2 transition">Sign in</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="flex justify-center items-center min-h-screen pt-32 pb-10 px-4">
        
        <div class="bg-gray-200 rounded-2xl shadow-xl border-2 border-red-900 w-full max-w-md p-8 relative">
            <div class="text-center mb-5 bg-red-900 p-4 rounded-xl border-2 shadow-inner">
                <h2 class="text-3xl font-bold text-white uppercase tracking-wide drop-shadow-md">Create Account</h2>
                <p class="text-white text-sm mt-1 opacity-80">สมัครสมาชิกใหม่</p>
            </div>

            <form id="registerForm" class="space-y-4">
                
                <div>
                    <label class="block text-red-900 font-semibold mb-1">Username:</label>
                    <input type="text" id="username" class="w-full px-4 py-2 text-red-900 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-900 transition placeholder-gray-400" placeholder="ตั้งชื่อผู้ใช้ของคุณ" required>
                </div>

                <div>
                    <label class="block text-red-900 font-semibold mb-1">Email:</label>
                    <input type="email" id="email" class="w-full px-4 py-2 text-red-900 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-900 transition placeholder-gray-400" placeholder="name@example.com" required>
                </div>

                <div>
                    <label class="block text-red-900 font-semibold mb-1">Phone Number:</label>
                    <input type="tel" id="phone" maxlength="12" class="w-full px-4 py-2 text-red-900 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-900 transition placeholder-gray-400" placeholder="0xx-xxx-xxxx" required>
                </div>

                <div>
                    <label class="block text-red-900 font-semibold mb-1">Password:</label>
                    <input type="password" id="password" class="w-full px-4 py-2 text-red-900 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-900 transition placeholder-gray-400" placeholder="••••••••" required>
                    
                    <div class="mt-2 text-xs text-gray-500 space-y-1 pl-1 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                        <p id="req-length" class="flex items-center"><span class="w-4 h-4 mr-1 border border-gray-400 rounded-full flex items-center justify-center text-[10px]">✕</span> อย่างน้อย 8 ตัวอักษร</p>
                        <p id="req-upper" class="flex items-center"><span class="w-4 h-4 mr-1 border border-gray-400 rounded-full flex items-center justify-center text-[10px]">✕</span> ตัวพิมพ์ใหญ่ (A-Z)</p>
                        <p id="req-lower" class="flex items-center"><span class="w-4 h-4 mr-1 border border-gray-400 rounded-full flex items-center justify-center text-[10px]">✕</span> ตัวพิมพ์เล็ก (a-z)</p>
                        <p id="req-number" class="flex items-center"><span class="w-4 h-4 mr-1 border border-gray-400 rounded-full flex items-center justify-center text-[10px]">✕</span> ตัวเลข (0-9)</p>
                    </div>
                </div>

                <div>
                    <label class="block text-red-900 font-semibold mb-1">Confirm Password:</label>
                    <input type="password" id="confirm_password" class="w-full px-4 py-2 text-red-900 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-900 transition placeholder-gray-400" placeholder="••••••••" required>
                    <p id="error-msg" class="text-red-600 font-bold text-xs mt-1 hidden">* รหัสผ่านไม่ตรงกัน</p>
                </div>

                <div class="pt-4 flex justify-center">
                    <button type="button" id="submitBtn" disabled class="w-full uppercase bg-red-900 hover:bg-red-800 text-white font-bold py-3 rounded-xl shadow-md transition duration-300 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                        Sign Up 
                    </button>
                </div>

            </form>

            <div class="mt-6 text-center border-t border-red-900/20 pt-4">
                <span class="text-sm text-gray-600">มีบัญชีอยู่แล้วใช่ไหม?</span>
                <a href="Signin.html" class="text-sm text-red-900 font-bold underline hover:text-red-700 ml-1">Sign in</a>
            </div>
        </div>
    </div>

    <script>
    const form = document.getElementById('registerForm');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const phoneInput = document.getElementById('phone');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('error-msg');

    // ฟังก์ชันดึงข้อมูลผู้ใช้จาก LocalStorage (ใช้ชื่อคีย์ให้ตรงกับหน้า Login)
    function getUsers() {
        const users = localStorage.getItem('rabbitz_users');
        return users ? JSON.parse(users) : [];
    }

    function clearError(inputElement) {
        const errorElement = inputElement.nextElementSibling;
        if (errorElement && errorElement.classList.contains('error-message')) {
            errorElement.remove();
        }
        inputElement.classList.remove('border-red-500', 'ring-red-500');
        inputElement.classList.add('border-gray-300', 'focus:ring-red-900');
    }

    function showError(inputElement, message) {
        clearError(inputElement);
        const errorElement = document.createElement('p');
        errorElement.className = 'error-message text-red-600 font-bold text-xs mt-1';
        errorElement.textContent = `* ${message}`;
        inputElement.parentNode.insertBefore(errorElement, inputElement.nextSibling);
        
        inputElement.classList.remove('border-gray-300', 'focus:ring-red-900');
        inputElement.classList.add('border-red-500', 'ring-red-500');
    }

    // --- 1. ตรวจสอบ Username ซ้ำ ---
    usernameInput.addEventListener('blur', function() {
        const users = getUsers();
        const username = this.value.trim();
        const exists = users.some(user => user.username === username);
        
        if (username && exists) {
            showError(this, 'Username นี้มีผู้ใช้งานแล้ว โปรดเปลี่ยนใหม่');
            validateForm();
        } else {
            clearError(this);
            validateForm();
        }
    });

    // --- 2. ตรวจสอบ Email ซ้ำ ---
    emailInput.addEventListener('blur', function() {
        const users = getUsers();
        const email = this.value.trim();
        const exists = users.some(user => user.email === email);
        
        if (email && exists) {
            showError(this, 'Email นี้ลงทะเบียนไปแล้ว โปรดเข้าสู่ระบบแทน');
            validateForm(); 
        } else {
            clearError(this);
            validateForm();
        }
    });

    // --- 3. Phone Auto-Format (0xx-xxx-xxxx) ---
    phoneInput.addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, ''); 
        if (value.length > 10) value = value.slice(0, 10); 

        if (value.length > 6) {
            value = value.slice(0, 3) + '-' + value.slice(3, 6) + '-' + value.slice(6);
        } else if (value.length > 3) {
            value = value.slice(0, 3) + '-' + value.slice(3);
        }
        e.target.value = value;
    });

    // --- 4. Password Validation Logic ---
    function validateForm() {
        const pass = passwordInput.value;
        const confirm = confirmInput.value;

        const hasUpper = /[A-Z]/.test(pass);
        const hasLower = /[a-z]/.test(pass);
        const hasNumber = /[0-9]/.test(pass);
        const hasLength = pass.length >= 8;

        updateStatus('req-upper', hasUpper);
        updateStatus('req-lower', hasLower);
        updateStatus('req-number', hasNumber);
        updateStatus('req-length', hasLength);

        const isMatch = pass === confirm && pass !== '';
        
        if (!isMatch && confirm !== '') {
            errorMsg.classList.remove('hidden');
            confirmInput.classList.add('border-red-500', 'ring-1', 'ring-red-500');
            confirmInput.classList.remove('border-green-500', 'ring-green-500', 'border-gray-300');
        } else if (isMatch) {
            errorMsg.classList.add('hidden');
            confirmInput.classList.remove('border-red-500', 'ring-red-500', 'border-gray-300');
            confirmInput.classList.add('border-green-500', 'ring-1', 'ring-green-500');
        } else {
            errorMsg.classList.add('hidden');
            confirmInput.classList.remove('border-red-500', 'ring-red-500', 'border-green-500', 'ring-green-500', 'ring-1');
            confirmInput.classList.add('border-gray-300');
        }

        const hasErrors = document.querySelectorAll('.error-message').length > 0;

        if (hasUpper && hasLower && hasNumber && hasLength && isMatch && !hasErrors && usernameInput.value.trim() !== '' && emailInput.value.trim() !== '') {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    }

    function updateStatus(elementId, isValid) {
        const el = document.getElementById(elementId);
        const icon = el.querySelector('span');
        
        if (isValid) {
            el.classList.remove('text-gray-500');
            el.classList.add('text-green-700', 'font-semibold');
            icon.innerText = '✓';
            icon.classList.remove('border-gray-400');
            icon.classList.add('border-green-700', 'bg-green-100', 'text-green-700');
        } else {
            el.classList.add('text-gray-500');
            el.classList.remove('text-green-700', 'font-semibold');
            icon.innerText = '✕';
            icon.classList.add('border-gray-400');
            icon.classList.remove('border-green-700', 'bg-green-100', 'text-green-700');
        }
    }

    passwordInput.addEventListener('input', validateForm);
    confirmInput.addEventListener('input', validateForm);
    
    // --- 5. จัดการตอน Submit Form ---
    submitBtn.addEventListener('click', function(e) {
        if(submitBtn.disabled) return;
        
        const users = getUsers();
        const inputUsername = usernameInput.value.trim();
        const inputEmail = emailInput.value.trim();
        
        const isUsernameExists = users.some(user => user.username === inputUsername);
        const isEmailExists = users.some(user => user.email === inputEmail);
        
        if(isUsernameExists || isEmailExists) {
            alert('ข้อมูลไม่ถูกต้อง กรุณาตรวจสอบ Username หรือ Email อีกครั้ง');
            return;
        }

        const newUser = {
            username: inputUsername,
            email: inputEmail,
            phone: phoneInput.value,
            password: passwordInput.value, 
            role: 'customer',
            fullname: inputUsername 
        };

        // บันทึกผู้ใช้ใหม่
        users.push(newUser);
        localStorage.setItem('rabbitz_users', JSON.stringify(users));
        
        // เมื่อสมัครเสร็จ ตั้งค่า Role เริ่มต้นเป็น Customer (จำลองการ Login)
        const userData = {
            isLoggedIn: true,
            name: newUser.username,
            email: newUser.email,
            role: newUser.role
        };
        localStorage.setItem('rabbitz_currentUser', JSON.stringify(userData));
        
        // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
        submitBtn.innerHTML = 'CREATING...';
        submitBtn.disabled = true;
        
        // เด้งไปหน้า Rolechoosen ตามที่ผู้ใช้ระบุ (หรืออาจจะไป HomepageCus เลยก็ได้)
        setTimeout(() => {
            window.location.href = "Rolechoosen.html";
        }, 800);
    });

    validateForm();
    </script>
</body>
</html>
