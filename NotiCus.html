<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Nail It By Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { brand: { 900: '#7f1d1d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans relative overflow-x-hidden">
 
    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
               
                <div class="flex items-center justify-start">
                    <a href="HomepageCus.html" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="size-16 mr-3 bg-white rounded-full p-1" alt="Rabbitz Logo" onerror="this.src='https://ui-avatars.com/api/?name=Logo&background=fff&color=7f1d1d'"/>
                    </a>
 
                    <div class="hidden md:block relative mr-4">
                        <h1 class="text-white text-lg font-medium">NAIL IT BY RABBITZ สาขา มหาวิทยาลัยพะเยา</h1>
                    </div>
                </div>
 
                <div class="flex items-center gap-6">
                    <ul class="hidden lg:flex flex-row space-x-6 text-sm font-medium text-white items-center">
                        <li><a href="HomepageCus.html" class="hover:text-red-200 transition">Homepage</a></li>
                        <li class="w-px h-5 bg-white/30"></li>
                        <li><a href="Contact.html" class="hover:text-red-200 transition">Contact</a></li>
                        <li class="w-px h-5 bg-white/30"></li>
                        <li><a href="Booking.html" class="hover:text-red-200 transition">Booking</a></li>
                    </ul>
                   
                    <div class="hidden lg:block w-px h-6 bg-white/30 mx-2"></div>
 
                    <div class="flex items-center space-x-4">
                       
                        <span id="userNameDisplay" class="text-white text-sm font-medium hidden md:block"></span>
 
                        <button type="button" onclick="window.location.href='NotiCus.html'" class="relative p-2 text-white hover:bg-white/10 rounded-full transition focus:outline-none">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                            </svg>
                            <span class="absolute top-2 right-2 flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-300 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-400 border-2 border-red-900"></span>
                            </span>
                        </button>
 
                        <button type="button" class="flex text-sm bg-white rounded-full focus:ring-4 focus:ring-red-700 overflow-hidden size-10 border-2 border-white/20 shadow-sm transition hover:scale-105">
                            <img id="userProfilePic" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=User&background=fff&color=7f1d1d" alt="User Profile">
                        </button>
 
                        <button onclick="handleLogout()" class="text-xs text-white underline hover:text-red-200 ml-2 hidden lg:block">Log out</button>
 
                    </div>
                    <div class="flex items-center gap-4 border-l border-white/30 pl-6">
                    <button id="menuBtn" class="text-white hover:bg-white/10 p-2 rounded-lg transition focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    </button>
                    </div>
                </div>
 
            </div>
        </nav>
        
        <div id="sidebar" class="fixed top-0 right-0 h-full w-72 bg-gradient-to-b from-[#801919] to-[#5d1212] z-[100] transform translate-x-full transition-transform duration-300 ease-in-out shadow-2xl rounded-l-[3rem]">
            <div class="p-8 flex flex-col items-center">
                <button id="closeBtn" class="self-end text-white mb-4 hover:scale-110 transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                
                <div class="flex flex-col items-center mb-6">
                    <div class="size-24 bg-white rounded-full p-1 shadow-xl overflow-hidden border-2 border-white/30 mb-3">
                        <img id="userProfilePicSidebar" class="w-full h-full object-cover rounded-full" src="https://ui-avatars.com/api/?name=User&background=fff&color=7f1d1d" alt="User Profile">
                    </div>
                    <p id="sidebarUserNameDisplay" class="text-white font-bold text-lg uppercase tracking-wide">Loading...</p>
                </div>
            </div>
     
            <div class="px-6 py-4">
                <div class="bg-gray-100/95 rounded-[2.5rem] p-8 space-y-6 text-center shadow-lg">
                    <a href="Accountsetting.html" class="block text-[#801919] font-bold hover:text-red-700 transition uppercase tracking-widest text-sm border-b border-[#801919]/10 pb-4">Setting</a>
                    <a href="History.html" class="block text-[#801919] font-bold hover:text-red-700 transition uppercase tracking-widest text-sm">My Booking & History</a>
                </div>
            </div>
     
            <div class="absolute bottom-12 left-0 right-0 px-10 text-center">
                <button onclick="handleLogout()" class="w-full border-2 border-white text-white py-2 rounded-full font-bold uppercase text-sm hover:bg-white hover:text-[#801919] transition">
                    Sign out
                </button>
            </div>
        </div>
        <div id="overlay" class="fixed inset-0 bg-black/40 z-[90] hidden transition-opacity duration-300 opacity-0"></div>
    </header>
 
    <main class="min-h-screen pt-28 pb-10 px-4 flex justify-center">
        <div class="w-full max-w-2xl">
           
            <div class="bg-red-900 p-6 rounded-t-2xl shadow-lg border-b-4 border-red-950">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-white uppercase tracking-wide">แจ้งเตือนของคุณ</h2>
                        <p class="text-red-100 text-sm">อัปเดตสถานะคิวล่าสุด</p>
                    </div>
                    <span id="notif-count" class="bg-white text-red-900 px-3 py-1 rounded-full font-bold text-sm transition">กำลังโหลด...</span>
                </div>
            </div>
 
            <div id="notification-list" class="bg-white rounded-b-2xl shadow-xl overflow-hidden border border-gray-200">
                <div class="text-center py-10 text-gray-500">
                    <svg class="animate-spin h-8 w-8 text-red-900 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    กำลังดึงข้อมูล...
                </div>
            </div>
 
            <div id="empty-state" class="hidden bg-white rounded-b-2xl p-12 shadow-xl text-center border border-gray-200">
                <div class="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-900">ไม่มีการแจ้งเตือน</h3>
                <p class="text-gray-500 mt-2">คุณยังไม่มีประวัติการทำรายการ หรือข้อความใหม่ในขณะนี้</p>
            </div>
 
        </div>
    </main>
 
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userDataString = localStorage.getItem('rabbitz_currentUser');
            if (userDataString) {
                const userData = JSON.parse(userDataString);
                
                const nameDisplay = document.getElementById('userNameDisplay');
                if (nameDisplay) nameDisplay.innerText = `Hi, ${userData.name}`;
                
                const sidebarNameDisplay = document.getElementById('sidebarUserNameDisplay');
                if (sidebarNameDisplay) sidebarNameDisplay.innerText = `Hi, ${userData.name}`;

                const profileUrl = userData.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=fff&color=7f1d1d&bold=true`;
                const profilePic = document.getElementById('userProfilePic');
                const sidebarPreview = document.getElementById('userProfilePicSidebar');
                
                const savedPic = localStorage.getItem('savedProfilePic');
                if (savedPic) {
                    if (profilePic) profilePic.src = savedPic;
                    if (sidebarPreview) sidebarPreview.src = savedPic;
                } else {
                    if (profilePic) profilePic.src = profileUrl;
                    if (sidebarPreview) sidebarPreview.src = profileUrl;
                }

                // โหลดข้อมูลแจ้งเตือน
                loadRealNotifications(userData.name);

            } else {
                alert('กรุณาเข้าสู่ระบบก่อนใช้งานครับ');
                window.location.href = 'index.html';
            }

            // ระบบเปิด-ปิด Sidebar
            const menuBtn = document.getElementById('menuBtn');
            const closeBtn = document.getElementById('closeBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            function toggleMenu() {
                const isOpen = !sidebar.classList.contains('translate-x-full');
                if (!isOpen) {
                    sidebar.classList.remove('translate-x-full');
                    overlay.classList.remove('hidden');
                    setTimeout(() => overlay.classList.add('opacity-100'), 10);
                } else {
                    sidebar.classList.add('translate-x-full');
                    overlay.classList.remove('opacity-100');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            }

            if(menuBtn) menuBtn.addEventListener('click', toggleMenu);
            if(closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if(overlay) overlay.addEventListener('click', toggleMenu);
        });

        function handleLogout() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                localStorage.removeItem('rabbitz_currentUser');
                localStorage.removeItem('savedProfilePic');
                window.location.href = 'index.html';
            }
        }

        // ==========================================
        // ⭐️ ระบบดึงแจ้งเตือนจากประวัติการจองจริง
        // ==========================================
        function loadRealNotifications(userName) {
            const allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
            
            const myBookings = allBookings.filter(b => b.customer_name === userName);
            
            const notifList = document.getElementById('notification-list');
            const emptyState = document.getElementById('empty-state');
            const notifCount = document.getElementById('notif-count');

            if (myBookings.length === 0) {
                notifList.innerHTML = '';
                notifList.classList.add('hidden');
                emptyState.classList.remove('hidden');
                notifCount.innerText = "0 ใหม่";
                notifCount.classList.add('bg-gray-200', 'text-gray-500');
                notifCount.classList.remove('bg-white', 'text-red-900', 'cursor-pointer', 'hover:bg-gray-100');
                return;
            }

            emptyState.classList.add('hidden');
            
            // ดึงรายการประวัติการอ่านมาตรวจสอบ (บันทึกรหัสคิว + สถานะ)
            const readNotifs = JSON.parse(localStorage.getItem('rabbitz_read_notifs')) || [];

            let html = '';
            let unreadCount = 0;
            
            [...myBookings].reverse().forEach(booking => {
                const dateObj = new Date(booking.date);
                const dateStr = dateObj.toLocaleDateString('th-TH', { month: 'short', day: 'numeric' });
                
                let title = '';
                let detail = '';
                let iconSVG = '';
                let bgIconColor = '';
                let textIconColor = '';

                if (booking.status === 'รอการยืนยัน' || booking.status === 'Pending Payment') {
                    title = 'จองคิวสำเร็จ (รอร้านยืนยัน)';
                    detail = `คิวทำเล็บวันที่ ${dateStr} เวลา ${booking.time} น. ระบบได้รับข้อมูลแล้ว รอแอดมินยืนยันสักครู่นะคะ`;
                    bgIconColor = 'bg-yellow-100';
                    textIconColor = 'text-yellow-700';
                    iconSVG = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                } 
                else if (booking.status === 'Confirmed' || booking.status === 'ยืนยันแล้ว') {
                    title = 'ร้านยืนยันการจองคิวแล้ว';
                    detail = `คิวทำเล็บวันที่ ${dateStr} เวลา ${booking.time} น. ได้รับการยืนยันจากแอดมินแล้ว เจอกันที่ร้านนะคะ!`;
                    bgIconColor = 'bg-green-100';
                    textIconColor = 'text-green-700';
                    iconSVG = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`;
                } 
                else {
                    title = 'คิวถูกยกเลิก / หมดเวลา';
                    detail = `คิวทำเล็บวันที่ ${dateStr} เวลา ${booking.time} น. ถูกยกเลิก หรือหมดเวลาชำระเงินมัดจำ กรุณาทำรายการใหม่ค่ะ`;
                    bgIconColor = 'bg-red-100';
                    textIconColor = 'text-red-700';
                    iconSVG = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                }

                // เช็คว่าสถานะนี้ของคิวนี้ อ่านไปหรือยัง
                const notifUniqueKey = `${booking.id}_${booking.status}`;
                const isRead = readNotifs.includes(notifUniqueKey);

                if (!isRead) {
                    unreadCount++;
                }

                const unreadBgClass = isRead ? 'bg-white' : 'bg-red-50/50';
                const indicatorHtml = isRead ? '' : '<div class="notif-indicator absolute left-0 top-0 bottom-0 w-1 bg-red-900"></div>';

                html += `
                    <div class="notif-item p-5 border-b border-gray-100 hover:bg-gray-50 transition cursor-pointer relative ${unreadBgClass}" onclick="window.location.href='History.html'">
                        ${indicatorHtml}
                        <div class="flex items-start gap-4">
                            <div class="${bgIconColor} p-2 rounded-full ${textIconColor}">
                                ${iconSVG}
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-900">${title}</h3>
                                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">ID: ${booking.id}</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-1 leading-relaxed">${detail}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            notifList.innerHTML = html;

            // จัดการแสดงผลปุ่มด้านบน
            if (unreadCount > 0) {
                notifCount.innerText = `${unreadCount} ใหม่ (อ่านทั้งหมด)`;
                notifCount.classList.remove('bg-gray-200', 'text-gray-500');
                notifCount.classList.add('bg-white', 'text-red-900', 'cursor-pointer', 'hover:bg-gray-100');
                notifCount.onclick = markAllAsRead;
            } else {
                notifCount.innerText = "0 ใหม่";
                notifCount.classList.add('bg-gray-200', 'text-gray-500');
                notifCount.classList.remove('bg-white', 'text-red-900', 'cursor-pointer', 'hover:bg-gray-100');
                notifCount.onclick = null; // ปิดการกดปุ่ม
            }
        }

        // ==========================================
        // ฟังก์ชันกดอ่านทั้งหมด (บันทึกข้อมูลแบบถาวร)
        // ==========================================
        function markAllAsRead() {
            const userDataString = localStorage.getItem('rabbitz_currentUser');
            if (!userDataString) return;
            
            const userData = JSON.parse(userDataString);
            const allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
            const myBookings = allBookings.filter(b => b.customer_name === userData.name);
            
            let readNotifs = JSON.parse(localStorage.getItem('rabbitz_read_notifs')) || [];
            
            // นำ ID คิว + Status ปัจจุบันทั้งหมดใส่ลงใน array การอ่าน
            myBookings.forEach(b => {
                const notifUniqueKey = `${b.id}_${b.status}`;
                if (!readNotifs.includes(notifUniqueKey)) {
                    readNotifs.push(notifUniqueKey);
                }
            });
            
            // บันทึกการอ่านลง LocalStorage
            localStorage.setItem('rabbitz_read_notifs', JSON.stringify(readNotifs));
            
            // สั่งโหลดหน้าจอใหม่เพื่อให้สีแดงหายไป
            loadRealNotifications(userData.name);
        }
    </script>
</body>
</html>
