<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        brand: { 900: '#7f1d1d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                
                <div class="flex items-center justify-start">
                    <a href="#" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="w-12 h-12 mr-3 bg-white rounded-full object-cover" alt="Rabbitz Logo" />
                        <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">Rabbitz</span>
                    </a>

                    <div class="hidden md:block relative mr-4"> 
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-5 h-5 text-red-900" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"></path></svg>
                        </div>
                        <input type="text" id="search-navbar" class="block w-64 p-2 pl-10 text-sm text-red-900 bg-gray-200 border border-red-900 rounded-lg placeholder-gray-500 focus:ring-white focus:border-white" placeholder="Search">
                    </div>
                </div>

                <div class="flex items-center justify-between w-auto" id="navbar-sticky">
                    <ul class="flex flex-row items-center p-0 mt-0 space-x-6 text-sm font-medium border-0 mr-8">
                        <li><a href="Homepage.html" class="text-white hover:text-red-900 hover:bg-white px-3 py-2 rounded-lg transition">Homepage</a></li>
                        <div class="hidden lg:block w-px h-6 bg-white mr-4"></div> 
                        <li><a href="Contact.html" class="text-white hover:text-red-900 hover:bg-white px-3 py-2 rounded-lg transition">Contact</a></li>
                        <div class="hidden lg:block w-px h-6 bg-white mr-4"></div>
                        <li><a href="Booking.html" class="text-red-900 bg-white px-3 py-2 rounded-lg font-bold">Booking</a></li>
                    </ul>

                    <div class="flex items-center space-x-4">
                        <a href="Signup.html" class="text-white border-2 border-white focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-4 py-2 text-center inline-flex items-center hover:bg-white hover:text-red-900 transition">
                            Sign up
                        </a>
                        <a href="Rolechoosen.html" class="text-red-900 bg-white focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-4 py-2 text-center inline-flex items-center hover:bg-gray-100 transition">
                            Sign in
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="pt-28 pb-12 px-4">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-8">
            <h2 class="font-bold text-3xl text-red-900 mb-8 border-b pb-4">จองคิวรับบริการ (Booking)</h2>

            <form action="#" method="POST" enctype="multipart/form-data">
                
                <div class="mb-10 bg-red-50 p-6 rounded-xl border border-red-100">
                    <h3 class="text-xl font-semibold mb-4 text-red-900">1. เลือกวันและเวลานัดหมาย</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="booking_date" class="block mb-2 text-sm font-medium text-gray-700">วันที่ต้องการจอง <span class="text-red-600">*</span></label>
                            <select id="booking_date" name="booking_date" required class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-red-900 focus:border-red-900 block w-full p-3 outline-none transition cursor-pointer shadow-sm">
                                <option value="" disabled selected>-- เลือกวันที่ว่าง --</option>
                                </select>
                        </div>
                        <div>
                            <label for="booking_time" class="block mb-2 text-sm font-medium text-gray-700">รอบเวลา (รอบละ 1 ชม. 30 นาที) <span class="text-red-600">*</span></label>
                            <select id="booking_time" name="booking_time" required disabled class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-red-900 focus:border-red-900 block w-full p-3 outline-none transition cursor-pointer shadow-sm disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed">
                                <option value="" disabled selected>-- กรุณาเลือกวันที่ก่อน --</option>
                                </select>
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-2">
                        <h3 class="text-xl font-semibold text-gray-800">2. เลือกบริการที่คุณต้องการ</h3>
                        <div class="space-x-4">
                            <button type="button" onclick="selectAllServices()" class="text-sm font-medium text-red-900 hover:text-red-700 underline transition">+ เลือกทั้งหมด</button>
                            <button type="button" onclick="clearAllServices()" class="text-sm font-medium text-gray-500 hover:text-gray-700 underline transition">- ล้างทั้งหมด</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="services-container">
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="ทาสีพื้นมือ" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">ทาสีพื้นมือ</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="ทาสีพื้นเท้า" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">ทาสีพื้นเท้า</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="ทาสีแฟลช/ลูกแก้ว" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">ทาสีแฟลช / ลูกแก้ว</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="ปั้นนูน" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">ปั้นนูน</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="เพ้นท์นิ้ว" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">เพ้นท์นิ้ว</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="ตัดเล็บขบ" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">ตัดเล็บขบ</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="เสริมเล็บฉีก" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">เสริมเล็บฉีก</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="Overlay" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">Overlay</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="PVC กาวเจล" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">PVC กาวเจล</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="PVC กาวธรรมดา" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">PVC กาวธรรมดา</span></label>
                        <label class="flex items-center p-3 border rounded-lg hover:bg-red-50 cursor-pointer transition"><input type="checkbox" name="services[]" value="PVC โพลีเจล" class="service-checkbox w-5 h-5 text-red-900 accent-red-900 bg-gray-100 border-gray-300 rounded focus:ring-red-900"><span class="ml-3 text-gray-700">PVC โพลีเจล</span></label>
                    </div>
                </div>

                <div class="mb-8">
                    <h3 class="text-xl font-semibold mb-2 text-gray-800">3. อัปโหลดรูปเรฟเฟอเรนซ์ (Reference)</h3>
                    <p class="text-sm text-gray-500 mb-4">* สามารถอัปโหลดรูปภาพได้สูงสุด 5 รูป เพื่อเป็นแบบให้ช่าง</p>
                    
                    <div class="flex items-center justify-center w-full">
                        <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">คลิกเพื่ออัปโหลด</span> หรือลากไฟล์มาวาง</p>
                            </div>
                            <input id="dropzone-file" type="file" name="reference_images[]" class="hidden" multiple accept="image/*" />
                        </label>
                    </div>

                    <div id="image-preview-container" class="grid grid-cols-2 md:grid-cols-5 gap-4 mt-4"></div>
                </div>

                <div class="mb-10">
                    <h3 class="text-xl font-semibold mb-2 text-gray-800">4. รายละเอียดเพิ่มเติม</h3>
                    <textarea id="additional_details" name="additional_details" rows="3" class="block p-3 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-red-900 focus:border-red-900 placeholder-gray-400 outline-none transition" placeholder="พิมพ์บอกช่างได้เลยว่าต้องการโทนสีไหน หรือมีข้อควรระวังเรื่องเล็บเป็นพิเศษ"></textarea>
                </div>

                <div class="flex justify-end pt-4 border-t border-gray-200">
                    <button type="submit" class="text-white bg-red-900 hover:bg-red-800 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-lg px-10 py-3 text-center inline-flex items-center transition shadow-md">
                        ดำเนินการต่อ
                        <svg class="w-5 h-5 ml-2 -mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // ระบบจัดการ วันและเวลาที่ว่าง (Mock Database)
        // --------------------------------------------------------
        // โครงสร้างข้อมูลจำลอง: กำหนดวันที่ว่าง และ รอบเวลาที่ว่างของวันนั้นๆ (รอบละ 1.30 ชม.)
        const availableSchedule = {
            "2026-03-05": ["10:00 - 11:30", "13:00 - 14:30", "16:00 - 17:30"],
            "2026-03-06": ["11:30 - 13:00", "14:30 - 16:00"],
            "2026-03-07": ["10:00 - 11:30", "11:30 - 13:00", "14:30 - 16:00", "16:00 - 17:30"],
            "2026-03-08": ["13:00 - 14:30", "17:30 - 19:00"]
        };

        const dateSelect = document.getElementById('booking_date');
        const timeSelect = document.getElementById('booking_time');

        // ฟังก์ชันแปลงวันที่ให้อ่านง่ายขึ้น (เช่น จาก 2026-03-05 เป็น 5 มี.ค. 2026)
        const formatDate = (dateString) => {
            const dateObj = new Date(dateString);
            return dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        // โหลดข้อมูล "วันที่ว่าง" ใส่ลงใน Dropdown ทันทีเมื่อเปิดเว็บ
        for (const date in availableSchedule) {
            const option = document.createElement('option');
            option.value = date;
            option.textContent = `${formatDate(date)} (ว่าง ${availableSchedule[date].length} คิว)`;
            dateSelect.appendChild(option);
        }

        // เมื่อลูกค้าเปลี่ยนวันที่ ให้โหลด "เวลาที่ว่าง" ของวันนั้นๆ ออกมาแสดง
        dateSelect.addEventListener('change', function() {
            const selectedDate = this.value;
            const availableTimes = availableSchedule[selectedDate];

            // ล้างตัวเลือกเวลาของเก่าทิ้ง
            timeSelect.innerHTML = '<option value="" disabled selected>-- เลือกรอบเวลา --</option>';
            
            if (availableTimes && availableTimes.length > 0) {
                timeSelect.disabled = false; // ปลดล็อกให้กดเลือกเวลาได้
                availableTimes.forEach(time => {
                    const option = document.createElement('option');
                    option.value = time;
                    option.textContent = time;
                    timeSelect.appendChild(option);
                });
            } else {
                timeSelect.disabled = true;
                timeSelect.innerHTML = '<option value="" disabled selected>-- ไม่มีคิวว่าง --</option>';
            }
        });

        // --------------------------------------------------------
        // ระบบ Checkbox บริการ
        // --------------------------------------------------------
        function selectAllServices() {
            document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = true);
        }

        function clearAllServices() {
            document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = false);
        }

        // --------------------------------------------------------
        // ระบบโชว์ภาพพรีวิว และ จำกัดจำนวนรูป (สูงสุด 5 รูป)
        // --------------------------------------------------------
        const fileInput = document.getElementById('dropzone-file');
        const previewContainer = document.getElementById('image-preview-container');

        fileInput.addEventListener('change', function() {
            previewContainer.innerHTML = ''; // เคลียร์รูปเก่าที่เคยเลือก
            const files = Array.from(this.files);

            if (files.length > 5) {
                alert('ขออภัยค่ะ คุณสามารถอัปโหลดรูปภาพได้สูงสุด 5 รูปเท่านั้น');
                this.value = ''; // ล้างการเลือกไฟล์ทิ้ง
                return;
            }

            files.forEach(file => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imgDiv = document.createElement('div');
                        imgDiv.className = 'relative w-full h-24 rounded-lg overflow-hidden border border-gray-200 shadow-sm';
                        imgDiv.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover" alt="Preview">`;
                        previewContainer.appendChild(imgDiv);
                    }
                    reader.readAsDataURL(file);
                }
            });
        });
    </script>
</body>
</html>
