<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Nail It By Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { brand: { 900: '#7f1d1d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <header>
        <nav class="border-b border-red-900 px-4 py-2.5 fixed left-0 right-0 top-0 z-50 bg-red-900 w-full md:w-auto">
            <div class="flex flex-wrap items-center justify-between mx-auto max-w-[1600px]">
                <div class="flex items-center justify-start">
                    <a href="#" class="flex items-center mr-6">
                        <img src="logo rabbitz.svg" class="size-20 mr-3 bg-white rounded-full" alt="Rabbitz Logo" />
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <div class="min-h-screen flex items-center justify-center pt-28 pb-10 px-4">
        <div class="bg-gray-200 p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-red-900 relative">
            
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-red-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg border-2 border-white">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-red-900 uppercase tracking-wide">Reset Password</h1>
                <p class="text-gray-600 text-sm mt-1" id="email-target">ตั้งรหัสผ่านใหม่เพื่อความปลอดภัย</p>
            </div>

            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-red-900 mb-1">New Password</label>
                    <div class="relative">
                        <input type="password" id="new_password" 
                            class="w-full pl-4 pr-12 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-900 focus:border-transparent outline-none transition" 
                            placeholder="••••••••">
                        
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-red-900 focus:outline-none transition-colors">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="mt-3 bg-white p-3 rounded-lg border border-gray-300 text-xs space-y-1 shadow-sm">
                        <p class="font-bold text-gray-500 mb-1">Password must contain:</p>
                        <p id="req-length" class="flex items-center text-gray-400 transition-colors duration-200"><span class="w-4 mr-1">○</span> อย่างน้อย 8 ตัวอักษร</p>
                        <p id="req-upper" class="flex items-center text-gray-400 transition-colors duration-200"><span class="w-4 mr-1">○</span> ตัวพิมพ์ใหญ่ (A-Z)</p>
                        <p id="req-lower" class="flex items-center text-gray-400 transition-colors duration-200"><span class="w-4 mr-1">○</span> ตัวพิมพ์เล็ก (a-z)</p>
                        <p id="req-number" class="flex items-center text-gray-400 transition-colors duration-200"><span class="w-4 mr-1">○</span> ตัวเลข (0-9)</p>
                        <p id="req-special" class="flex items-center text-gray-400 transition-colors duration-200"><span class="w-4 mr-1">○</span> อักขระพิเศษ (!@#$%^&*)</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-red-900 mb-1">Confirm New Password (Auto-fill)</label>
                    <input type="password" id="confirm_password" readonly
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed focus:outline-none transition" 
                        placeholder="••••••••">
                </div>

                <button type="button" id="submitBtn" onclick="submitChange()" disabled 
                    class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-3 rounded-xl shadow-md transition duration-300 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                    CONFIRM CHANGE
                </button>
            </form>

        </div>
    </div>

    <script>
        const newPassInput = document.getElementById('new_password');
        const confirmPassInput = document.getElementById('confirm_password');
        const submitBtn = document.getElementById('submitBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        document.addEventListener('DOMContentLoaded', () => {
            const resetEmail = sessionStorage.getItem('reset_email');
            if (!resetEmail) {
                alert('คำขอหมดอายุหรือไม่ถูกต้อง กรุณาเริ่มรายการใหม่');
                window.location.href = 'Rolechoosen.html';
            } else {
                document.getElementById('email-target').innerText = `สำหรับบัญชี: ${resetEmail}`;
            }
        });

        // 1. ระบบกดรูปตาเพื่อ ดู/ซ่อน รหัสผ่าน
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = newPassInput.type === 'password';
            
            // สลับ type ระหว่าง password กับ text
            newPassInput.type = isPassword ? 'text' : 'password';
            confirmPassInput.type = isPassword ? 'text' : 'password';
            
            // เปลี่ยนรูป SVG ของไอคอนตา
            if (isPassword) {
                // รูปตาปิด (มีขีดฆ่า)
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                // รูปตาปกติ (เปิดตา)
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        });

        // 2. ให้ช่อง Confirm พิมพ์ตามช่อง New อัตโนมัติ
        newPassInput.addEventListener('input', () => {
            confirmPassInput.value = newPassInput.value;
            validatePassword();
        });

        function validatePassword() {
            const val = newPassInput.value;

            const hasLength = val.length >= 8;
            const hasUpper = /[A-Z]/.test(val);
            const hasLower = /[a-z]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(val);

            updateRequirement('req-length', hasLength);
            updateRequirement('req-upper', hasUpper);
            updateRequirement('req-lower', hasLower);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-special', hasSpecial);

            // ถ้ารหัสผ่านเข้าเงื่อนไขทั้งหมด ปุ่มถึงจะกดได้
            if (hasLength && hasUpper && hasLower && hasNumber && hasSpecial) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        function updateRequirement(id, isValid) {
            const el = document.getElementById(id);
            const icon = el.querySelector('span');
            
            if (isValid) {
                el.classList.remove('text-gray-400');
                el.classList.add('text-green-700', 'font-bold');
                icon.innerText = '✓';
            } else {
                el.classList.add('text-gray-400');
                el.classList.remove('text-green-700', 'font-bold');
                icon.innerText = '○';
            }
        }

        function submitChange() {
            const resetEmail = sessionStorage.getItem('reset_email');
            const newPasswordValue = newPassInput.value;

            if(!resetEmail) {
                alert('เกิดข้อผิดพลาด ไม่พบข้อมูลอีเมล');
                return;
            }

            let storedUsers = JSON.parse(localStorage.getItem('rabbitz_users')) || [];
            const userIndex = storedUsers.findIndex(u => u.email === resetEmail);

            if (userIndex > -1) {
                storedUsers[userIndex].password = newPasswordValue;
                localStorage.setItem('rabbitz_users', JSON.stringify(storedUsers));

                submitBtn.innerHTML = 'CHANGING...';
                setTimeout(() => {
                    alert("เปลี่ยนรหัสผ่านสำเร็จ! กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่ของคุณ");
                    sessionStorage.removeItem('reset_email'); 
                    window.location.href = 'Rolechoosen.html';
                }, 1000);
            } else {
                alert('ข้อผิดพลาดจากระบบ: ไม่พบบัญชีอีเมลนี้ในฐานข้อมูล');
                window.location.href = 'Rolechoosen.html';
            }
        }
    </script>
</body>
</html>
