<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - เชื่อมต่อบัญชีธนาคาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-100 flex flex-col justify-center items-center min-h-screen text-slate-800">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center relative border border-slate-200">
        
        <div id="loading-overlay" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-3"></div>
            <span class="text-blue-600 font-bold">กำลังตรวจสอบยอดเงิน...</span>
        </div>

        <h3 class="text-xl text-slate-500 font-medium mb-2">สแกนเพื่อชำระเงิน</h3>
        
        <div class="text-4xl font-bold text-slate-800 mb-2">
            <span id="display-amount">0.00</span> 
            <span class="text-lg text-slate-500">THB</span>
        </div>
        
        <div class="text-xs text-slate-400 mb-6 bg-slate-50 py-1 px-3 rounded-full inline-block">
            โอนเข้า: <span id="display-account">...</span>
        </div>
        
        <div class="relative mx-auto w-[200px] h-[200px] mb-6 border-4 border-slate-100 rounded-lg p-2">
            <div id="qrcode" class="flex justify-center items-center w-full h-full"></div>
            
            <div id="expired-overlay" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm flex-col justify-center items-center z-10 rounded-lg">
                <div class="text-5xl mb-2">⏳</div>
                <div class="text-red-500 font-bold">หมดเวลาชำระเงิน</div>
            </div>
        </div>

        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100 mb-4">
            <span class="text-slate-500 text-sm">เวลาที่เหลือ</span>
            <span id="timer" class="text-xl font-mono font-bold text-blue-600">--:--</span>
        </div>

        <button onclick="manualCheckPayment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl shadow-lg shadow-blue-200 transition-all">
            ตรวจสอบสถานะการชำระเงิน
        </button>

    </div>

    <div class="mt-8 p-4 border border-dashed border-slate-400 rounded-lg bg-slate-200 w-full max-w-sm">
        <p class="text-xs text-slate-500 mb-2 text-center font-bold">-- ส่วนสำหรับทดสอบ (Developer) --</p>
        <div class="flex gap-2 justify-center">
            <button onclick="simulateSuccess()" class="px-4 py-2 bg-green-500 text-white rounded text-xs hover:bg-green-600 shadow-sm">จำลอง: จ่ายสำเร็จ</button>
            <button onclick="simulateFail()" class="px-4 py-2 bg-red-500 text-white rounded text-xs hover:bg-red-600 shadow-sm">จำลอง: จ่ายไม่สำเร็จ</button>
        </div>
    </div>

    <script>
        // =========================================================
        // 1. ตั้งค่าระบบ (CONFIG) ** แก้ไขตรงนี้ **
        // =========================================================
        const config = {
            promptpayID: "0948263229",   // ใส่เบอร์มือถือ หรือ เลขบัตร ปชช. (ไม่ต้องมีขีด)
            amount: 100.00,             // กำหนดยอดเงินตรงนี้
            timeLimit: 15 * 60,          // เวลา 15 นาที (วินาที)
            redirectUrl: "history.html"  // หน้าที่จะไปเมื่อจ่ายสำเร็จ
        };

        // =========================================================
        // 2. Logic สร้าง PromptPay QR Code (EMVCo Standard)
        // =========================================================
        function generatePromptPay(id, amount) {
            const target = id.length >= 13 ? id : ("0066" + id.substring(1)); // แปลง 08x -> 668x
            const targetType = id.length >= 13 ? "02" : "01"; // 02=บัตรปชช, 01=มือถือ
            
            let data = [
                "000201", "010211", "2937", 
                "0016A000000677010111" + targetType + (target.length < 10 ? "0" + target.length : target.length) + target,
                "5802TH", "5303764", 
                "54" + (amount.toFixed(2).length < 10 ? "0" + amount.toFixed(2).length : amount.toFixed(2).length) + amount.toFixed(2)
            ].join("");

            data += "6304"; // Checksum ID
            data += calcCRC16(data); // คำนวณ CRC16
            return data;
        }

        function calcCRC16(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                let x = ((crc >> 8) ^ str.charCodeAt(i)) & 0xFF;
                x ^= x >> 4;
                crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
            }
            return ("0000" + crc.toString(16).toUpperCase()).slice(-4);
        }

        // จัดรูปแบบเบอร์โทรให้สวยงาม (08x-xxx-xxxx)
        function formatID(id) {
            if(id.length === 10) return id.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
            return id;
        }

        // =========================================================
        // 3. เริ่มการทำงาน (Initialization)
        // =========================================================
        
        // แสดงข้อมูลบนหน้าจอ
        document.getElementById('display-amount').textContent = config.amount.toFixed(2);
        document.getElementById('display-account').textContent = formatID(config.promptpayID);

        // สร้าง Payload และ QR Code
        const payload = generatePromptPay(config.promptpayID, config.amount);
        console.log("Generated Payload:", payload); // เช็คค่าใน Console ได้

        const qrDiv = document.getElementById("qrcode");
        new QRCode(qrDiv, {
            text: payload,
            width: 180, height: 180,
            colorDark : "#1e293b", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });

        // =========================================================
        // 4. Timer Logic
        // =========================================================
        let timeLeft = config.timeLimit;
        const timerDisplay = document.getElementById('timer');
        const overlay = document.getElementById('expired-overlay');
        
        const countdown = setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdown);
                handleTimeout();
            }
        }, 1000);

        // =========================================================
        // 5. Check Status Logic & Simulation
        // =========================================================
        let serverPaymentStatus = "PENDING"; 

        // Polling: เช็คสถานะทุก 3 วินาที
        const checkInterval = setInterval(() => {
            checkPaymentStatusFromBackend(); 
        }, 3000);

        function checkPaymentStatusFromBackend() {
            // TODO: เชื่อมต่อ API จริงตรงนี้ เช่น fetch('/api/check-status?id=...')
            
            if (serverPaymentStatus === 'SUCCESS') {
                clearInterval(checkInterval); 
                clearInterval(countdown);    
                onPaymentSuccess();
            } 
            else if (serverPaymentStatus === 'FAILED') {
                clearInterval(checkInterval);
                onPaymentFailed();
            }
        }

        function manualCheckPayment() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                if (serverPaymentStatus === 'SUCCESS') {
                    onPaymentSuccess();
                } else {
                    Swal.fire({
                        icon: 'info',
                        title: 'ยังไม่ได้รับยอดเงิน',
                        text: 'ระบบกำลังรอการชำระเงิน...',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#3b82f6'
                    });
                }
            }, 1500);
        }

        // --- Event Handlers ---

        function onPaymentSuccess() {
            Swal.fire({
                icon: 'success',
                title: 'ชำระเงินสำเร็จ!',
                text: 'กำลังพาท่านไปหน้าประวัติการจอง...',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = config.redirectUrl; // ไปหน้าประวัติ
            });
        }

        function onPaymentFailed() {
            Swal.fire({
                icon: 'error',
                title: 'การชำระเงินล้มเหลว',
                text: 'กรุณาตรวจสอบรายการ หรือลองใหม่อีกครั้ง',
                confirmButtonText: 'ลองใหม่',
                confirmButtonColor: '#ef4444'
            }).then(() => {
                location.reload(); // รีเฟรชหน้า
            });
        }

        function handleTimeout() {
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            Swal.fire({
                icon: 'warning',
                title: 'หมดเวลาชำระเงิน',
                text: 'กรุณาสร้างรายการใหม่อีกครั้ง',
                confirmButtonText: 'รีโหลดหน้าเว็บ',
                allowOutsideClick: false
            }).then(() => {
                location.reload();
            });
        }

        // --- Simulation Tools ---
        function simulateSuccess() { serverPaymentStatus = "SUCCESS"; }
        function simulateFail() { serverPaymentStatus = "FAILED"; }

    </script>
</body>
</html>
