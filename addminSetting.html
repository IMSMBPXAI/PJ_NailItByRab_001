<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setting - Nail It By Rabbitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { brand: { 900: '#7f1d1d' } }
                }
            }
        }
    </script>
    <style>
        body::-webkit-scrollbar { display: none; }
       
        /* ปรับปรุงกล่องข้อความให้มีความลึกและชัดเจนไม่กลืนพื้นหลัง */
        .capsule-input {
            @apply w-full bg-[#fcf9d9] border-2 border-gray-400 rounded-full py-2.5 px-6 text-sm
                   focus-within:ring-2 focus-within:ring-brand-900/30 focus-within:border-brand-900
                   flex items-center justify-between shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all;
        }
       
        .section-card {
            @apply border border-gray-200 rounded-[2.5rem] p-6 mb-6 shadow-xl bg-white;
        }
       
        input:focus { outline: none; }
 
        /* ปรับปรุงความชัดในการเลือกวันที่ให้โดดเด่น */
        .day-cell {
            @apply cursor-pointer hover:bg-red-100 rounded-full py-1.5 transition-all
                   text-center h-10 w-10 flex items-center justify-center mx-auto font-medium
                   active:scale-90 select-none;
        }
       
        /* วันที่ถูกเลือก: แดงเข้ม ตัวหนังสือขาว มีวงแหวนซ้อน */
        .day-selected {
            @apply bg-brand-900 text-white font-bold shadow-md ring-4 ring-red-100 scale-110 !important;
        }
       
        .day-other { @apply text-gray-200 cursor-default py-1.5 text-center opacity-50; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
 
    <header>
        <nav class="bg-brand-900 px-4 py-2 fixed left-0 right-0 top-0 z-50 shadow-lg">
            <div class="flex items-center justify-between mx-auto max-w-[1400px]">
                <div class="flex items-center">
                    <a href="HomepageAddmin.html" class="flex items-center group">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center overflow-hidden">
                            <img src="logo rabbitz.svg" alt="Logo" class="w-8 h-8 object-contain" onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'text-brand-900 text-[10px]\'>RBZ</span>'">
                        </div>
                    </a>
                    <div class="ml-4 border-l border-white/20 pl-4 hidden sm:block">
                        <h1 class="text-white text-sm md:text-base font-medium uppercase tracking-wider">NAIL IT BY RABBITZ</h1>
                    </div>
                </div>
                <button onclick="adminLogout()" class="bg-white text-brand-900 hover:bg-gray-100 px-4 py-1.5 rounded-lg text-xs font-bold shadow-md transition active:scale-95">Log out</button>
            </div>
        </nav>
    </header>
 
    <div class="max-w-md mx-auto px-4 pt-24 flex items-center justify-between">
        <button onclick="history.back()" class="text-brand-900 bg-white p-2 rounded-full shadow-md hover:shadow-lg transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-2xl font-black text-brand-900 underline underline-offset-8 decoration-4 uppercase tracking-tighter">SETTING</h1>
        <button id="saveBtn" class="bg-brand-900 text-white px-7 py-2 rounded-full text-sm font-bold hover:bg-red-800 shadow-xl transition active:scale-95">บันทึก</button>
    </div>
 
    <main class="max-w-md mx-auto px-4 pt-6 pb-10">
       
        <div class="section-card">
            <div class="mb-8 flex items-center gap-2">
                <span class="bg-brand-900 text-white px-6 py-2 rounded-full text-[10px] font-black shadow-md italic uppercase tracking-widest">Shop Information</span>
                <div class="h-[2px] bg-brand-900/10 flex-1"></div>
            </div>
           
            <div class="space-y-6">
                <div>
                    <label class="block text-[11px] font-black mb-2 ml-4 italic text-brand-900 uppercase tracking-wider">ชื่อร้าน (Shop Name)</label>
                    <div class="capsule-input">
                        <input type="text" value="Nail It by Rabbitz" class="bg-transparent w-full font-semibold text-gray-800 outline-none">
                        <svg class="w-4 h-4 text-brand-900 opacity-60" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-black mb-2 ml-4 italic text-brand-900 uppercase tracking-wider">เบอร์โทรติดต่อ (Phone)</label>
                    <div class="capsule-input">
                        <input type="text" value="099 969 9596" class="bg-transparent w-full font-semibold text-gray-800 outline-none">
                        <svg class="w-4 h-4 text-brand-900 opacity-60" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-black mb-2 ml-4 italic text-brand-900 uppercase tracking-wider">เวลาทำการ (Business Hours)</label>
                    <div class="flex items-center gap-3">
                        <div class="capsule-input flex-1"><input type="text" value="9.30 AM" class="bg-transparent w-full text-center font-black"></div>
                        <span class="font-black text-brand-900 text-[10px] opacity-40 uppercase">To</span>
                        <div class="capsule-input flex-1"><input type="text" value="11.30 PM" class="bg-transparent w-full text-center font-black"></div>
                    </div>
                </div>
            </div>
        </div>
        <br>
 
        <div class="section-card">
            <div class="mb-8 flex items-center gap-2">
                <span class="bg-brand-900 text-white px-6 py-2 rounded-full text-[10px] font-black shadow-md italic uppercase tracking-widest">Holiday Planner</span>
                <div class="h-[2px] bg-brand-900/10 flex-1"></div>
            </div>
           
            <div class="flex gap-4 mb-6">
                <div class="flex-1">
                    <p class="text-center text-brand-900 font-black text-[10px] mb-2 tracking-widest">MONTH</p>
                    <select id="monthSelect" class="w-full bg-[#f3f4f6] border-2 border-gray-300 rounded-full py-2.5 px-2 text-[11px] font-black uppercase text-center focus:border-brand-900 outline-none shadow-sm cursor-pointer transition-all">
                        <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                        <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                        <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                        <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                    </select>
                </div>
                <div class="flex-1">
                    <p class="text-center text-brand-900 font-black text-[10px] mb-2 tracking-widest">YEAR</p>
                    <select id="yearSelect" class="w-full bg-[#f3f4f6] border-2 border-gray-300 rounded-full py-2.5 px-2 text-[11px] font-black text-center focus:border-brand-900 outline-none shadow-sm cursor-pointer transition-all">
                        <option value="2026">2026</option><option value="2027">2027</option>
                    </select>
                </div>
            </div>
 
            <div class="bg-gray-50 rounded-3xl p-5 border-2 border-gray-100 shadow-inner">
                <div class="text-center mb-6">
                    <span id="calendarHeader" class="text-brand-900 font-black tracking-[0.2em] text-sm uppercase">JANUARY</span>
                    <div class="h-1 bg-brand-900 w-16 mx-auto mt-2 rounded-full"></div>
                </div>
               
                <div class="grid grid-cols-7 text-center text-[10px] font-black text-brand-900/30 mb-4 uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
               
                <div id="calendarDays" class="grid grid-cols-7 text-[13px] gap-y-3">
                    </div>
            </div>
 
            <div class="mt-10 flex flex-col items-center gap-3">
                <p class="text-[10px] font-black text-gray-400 uppercase italic tracking-[0.2em]">Selected Date</p>
                <div id="selectedDateDisplay" class="bg-brand-900 border-4 border-red-50 rounded-full px-12 py-3 text-sm font-black shadow-2xl text-white tracking-[0.3em]">
                    01/01/2026
                </div>
            </div>
        </div>
 
    </main>
    <br><br>
 
    <footer class="text-center py-2 text-[10px] text-[#800000] border-t border-black ">
        NAIL IT BY RABBITZ สาขามหาวิทยาลัยพะเยา
    </footer>
 
    <script>
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const calendarDays = document.getElementById('calendarDays');
        const calendarHeader = document.getElementById('calendarHeader');
        const dateDisplay = document.getElementById('selectedDateDisplay');
 
        let selectedDay = 1;
 
        function renderCalendar() {
            const month = parseInt(monthSelect.value);
            const year = parseInt(yearSelect.value);
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
           
            calendarHeader.innerText = monthNames[month];
            calendarDays.innerHTML = '';
 
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
 
            for (let i = firstDay - 1; i >= 0; i--) {
                const div = document.createElement('div');
                div.className = 'day-other';
                div.innerText = prevMonthDays - i;
                calendarDays.appendChild(div);
            }
 
            for (let d = 1; d <= daysInMonth; d++) {
                const div = document.createElement('div');
                div.innerText = d;
                div.className = `day-cell ${d === selectedDay ? 'day-selected' : ''}`;
                div.onclick = () => { selectedDay = d; renderCalendar(); };
                calendarDays.appendChild(div);
            }
            updateDisplayDate();
        }
 
        function updateDisplayDate() {
            const m = (parseInt(monthSelect.value) + 1).toString().padStart(2, '0');
            const d = selectedDay.toString().padStart(2, '0');
            const y = yearSelect.value;
            dateDisplay.innerText = `${d}/${m}/${y}`;
        }
 
        monthSelect.onchange = () => { selectedDay = 1; renderCalendar(); };
        yearSelect.onchange = () => { selectedDay = 1; renderCalendar(); };
 
        renderCalendar();
 
        document.getElementById('saveBtn').onclick = function() {
            this.innerText = 'SAVING...';
            this.classList.add('opacity-50');
            setTimeout(() => {
                alert('✅ ข้อมูลถูกบันทึกลงระบบแล้ว!');
                this.innerText = 'บันทึก';
                this.classList.remove('opacity-50');
            }, 600);
        };
 
        function adminLogout() {
            if(confirm('คุณต้องการออกจากระบบจัดการใช่หรือไม่?')) window.location.href = 'LoginAdmin.html';
        }
    </script>
</body>
</html>
