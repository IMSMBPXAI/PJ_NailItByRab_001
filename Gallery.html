        <script>
    // ข้อมูลรูปภาพเริ่มต้น (สามารถเปลี่ยนเป็น Path รูปจริงๆ ของคุณองุ่นได้เลย)
    let images = JSON.parse(localStorage.getItem('rabbitz_gallery')) || [
        'pic/633932142_1362916385855924_282871075612265257_n.jpg',
        'pic/634931143_1365712815576281_5935012769015046080_n.jpg',
        'pic/637032793_1365703782243851_2013380184915318522_n.jpg',
        'pic/637144201_1365693598911536_5126569838382212738_n.jpg',
        'pic/637349459_1365695622244667_2662039558123424415_n.jpg'
    ];

    let currentPage = 1;
    const itemsPerPage = 5; // แสดงหน้าละ 5 รูป (บวกปุ่มบวกอีก 1 เป็น 6 ช่อง)

    const galleryGrid = document.getElementById('galleryGrid');
    const imageInput = document.getElementById('imageInput');
    const addBtn = document.getElementById('addBtn');

    // 1. ฟังก์ชันแสดงผล Gallery
    function renderGallery() {
        // ล้างรูปเก่าออกยกเว้นปุ่มบวก
        const oldImages = galleryGrid.querySelectorAll('.gallery-item');
        oldImages.forEach(img => img.remove());

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = images.slice(start, end);

        pageItems.forEach((src, index) => {
            const actualIndex = start + index;
            const container = document.createElement('div');
            container.className = "gallery-item group relative aspect-square rounded-[30px] shadow-md border-2 border-white overflow-hidden cursor-move transition-transform hover:scale-[1.02]";
            container.innerHTML = `
                <img src="${src}" class="w-full h-full object-cover">
                <button onclick="deleteImage(${actualIndex})" class="absolute top-2 right-2 bg-red-600/90 text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            galleryGrid.appendChild(container);
        });

        updatePagination();
    }

    // 2. ฟังก์ชันจัดการเลขหน้า
    function updatePagination() {
        const container = document.getElementById('paginationContainer');
        const totalPages = Math.max(1, Math.ceil(images.length / itemsPerPage));
        container.innerHTML = '';

        for (let i = 1; i <= totalPages + 1; i++) { // +1 หน้าเผื่อไว้เพิ่มรูปใหม่ข้ามหน้า
            const btn = document.createElement('button');
            btn.innerText = i;
            if (i === currentPage) {
                btn.className = "w-8 h-8 flex items-center justify-center rounded-full bg-[#800000] text-white text-sm font-medium shadow-md";
            } else {
                btn.className = "w-8 h-8 flex items-center justify-center rounded-full bg-white text-[#800000] border border-[#800000] text-sm font-medium hover:bg-red-50 transition";
            }
            btn.onclick = () => { currentPage = i; renderGallery(); };
            container.appendChild(btn);
        }
    }

    // 3. ระบบเพิ่มรูป
    addBtn.onclick = () => imageInput.click();
    imageInput.onchange = function() {
        const files = Array.from(this.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result); // เพิ่มรูปใหม่ไปต่อท้ายสุด
                localStorage.setItem('rabbitz_gallery', JSON.stringify(images));
                renderGallery();
            };
            reader.readAsDataURL(file);
        });
    };

    // 4. ระบบลบรูป
    window.deleteImage = function(index) {
        if (confirm('ลบรูปภาพนี้ใช่ไหมคะ?')) {
            images.splice(index, 1);
            localStorage.setItem('rabbitz_gallery', JSON.stringify(images));
            renderGallery();
        }
    }

    // 5. ระบบลากวางสลับรูป
    new Sortable(galleryGrid, {
        animation: 150,
        draggable: ".gallery-item",
        onEnd: function (evt) {
            const start = (currentPage - 1) * itemsPerPage;
            // คำนวณ Index ใหม่ใน Array (ลบ 1 เพราะปุ่มบวกอยู่ที่ index 0 ใน DOM)
            const oldIdx = evt.oldIndex - 1 + start;
            const newIdx = evt.newIndex - 1 + start;

            const movedItem = images.splice(oldIdx, 1)[0];
            images.splice(newIdx, 0, movedItem);

            localStorage.setItem('rabbitz_gallery', JSON.stringify(images));
        }
    });

    renderGallery();
</script>
