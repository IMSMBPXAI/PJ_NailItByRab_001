<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

</head>
<body>

                    <div class="hidden lg:block w-px h-6 bg-white/30 mx-2"></div>

                    <div class="flex items-center space-x-4">

<main class="pt-24 pb-12 max-w-4xl mx-auto px-4">
     <div class="max-w-[1600px] mx-auto px-4 py-8">

            <div class="relative rounded-2xl overflow-hidden mb-8 shadow-lg">
            <img src="pic/613027901_1331443012336595_6896879974426628931_n.jpg" class="w-full h-[300px] object-cover" alt="Promotion">
            <div class="absolute bottom-4 left-6 text-white shadow-2xl p-2 rounded">
                <h2 class="font-bold">PROMOTION</h2>

        </div>

        <div class="flex flex-col items-center my-10">
        <div class="w-1/3 border-t border-gray-300 mb-4"></div>
    
        <div class="bg-[#b3967a] text-white px-12 py-1 rounded-md shadow-sm uppercase tracking-widest text-sm font-medium">

        </div>
    
        <div class="w-1/3 border-t border-gray-300 mt-4"></div>
